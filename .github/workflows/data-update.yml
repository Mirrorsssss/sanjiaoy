name: 数据更新与网站同步

on:
  # 每周自动更新数据（每周一早上8点）
  schedule:
    - cron: '0 0 * * 1'
  
  # 也支持手动触发
  workflow_dispatch:
    inputs:
      update_type:
        description: '更新类型'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - prices
          - weapons

# 允许 GitHub Pages 部署
permissions:
  contents: read
  pages: write
  id-token: write

# 只在 main 分支运行
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # 任务1: 数据抓取与更新
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 安装依赖
        run: npm ci
      
      - name: 抓取最新游戏数据
        run: |
          echo "=== 开始抓取游戏数据 ==="
          node scripts/update-data.js
        env:
          UPDATE_TYPE: ${{ inputs.update_type || 'full' }}
      
      - name: 验证数据格式
        run: |
          echo "=== 验证数据文件 ==="
          node -e "
            const data = require('./data/game-data.json');
            console.log('数据版本:', data._version);
            console.log('武器数量:', Object.keys(data.weapons).reduce((a, k) => a + (data.weapons[k].items?.length || 0), 0));
            console.log('数据验证通过 ✓');
          "
      
      - name: 提交数据更新
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '📊 自动更新游戏数据'
          file_pattern: 'data/*'
          skip_dirty_check: false

  # 任务2: 构建和部署
  build-deploy:
    needs: update-data
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: main
      
      - name: 设置 Pages
        uses: actions/configure-pages@v5
      
      - name: 上传 artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 任务3: 生成更新报告
  generate-report:
    needs: update-data
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 生成更新报告
        run: |
          echo "# 数据更新报告" > update-report.md
          echo "" >> update-report.md
          echo "更新时间: $(date '+%Y-%m-%d %H:%M:%S')" >> update-report.md
          echo "触发方式: ${{ github.event_name }}" >> update-report.md
          echo "更新类型: ${{ inputs.update_type || 'scheduled' }}" >> update-report.md
          echo "" >> update-report.md
          echo "## 数据统计" >> update-report.md
          node -e "
            const data = require('./data/game-data.json');
            const weapons = Object.keys(data.weapons).reduce((a, k) => a + (data.weapons[k].items?.length || 0), 0);
            document.write('\\n- 武器数量: ' + weapons);
            document.write('\\n- 配件数量: ' + (data.attachments ? Object.keys(data.attachments).length : 0));
            document.write('\\n- 子弹类型: ' + (data.bullets?.items?.length || 0));
            document.write('\\n- 数据版本: ' + data._version);
          " >> update-report.md
          cat update-report.md

      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: update-report
          path: update-report.md
          retention-days: 7
