<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡战备计算器 - 实时价格版 - 三角洲行动 | 三角眼</title>
    <meta name="description" content="三角洲行动卡战备计算器，实时交易行价格，自动计算战备值。支持零号大坝、长弓溪谷、航天基地、巴克什、潮汐监狱等地图。">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎯</text></svg>">
    <link rel="stylesheet" href="style.css">
    <style>
        .calculator-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .calculator-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .calculator-header h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .calculator-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
        
        .data-status {
            text-align: center;
            padding: 1rem;
            margin-bottom: 2rem;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        
        .data-status.loading {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent-blue);
        }
        
        .data-status.loaded {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
        }
        
        .data-status.error {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }
        
        .gear-select-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .gear-select-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.3s;
        }
        
        .gear-select-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.1);
        }
        
        .gear-select-card h3 {
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--accent-blue);
        }
        
        .gear-select-card select {
            width: 100%;
            padding: 0.8rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        
        .gear-select-card select:hover {
            border-color: var(--accent-blue);
        }
        
        .gear-select-card select:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .gear-info {
            margin-top: 0.8rem;
            padding: 0.8rem;
            background: var(--bg-secondary);
            border-radius: 8px;
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: none;
        }
        
        .gear-info.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        .gear-info .price {
            color: #f59e0b;
            font-weight: 600;
        }
        
        .calculate-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 2rem auto;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
        }
        
        .calculate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            margin-top: 2rem;
            display: none;
        }
        
        .result-section.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .result-title {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .result-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.2rem;
        }
        
        .result-card h4 {
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 0.8rem;
        }
        
        .result-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin: 0.3rem 0;
        }
        
        .result-card .value {
            color: var(--accent-blue);
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .result-total {
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
        }
        
        .result-total h3 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
        }
        
        .result-total .total-value {
            font-size: 2rem;
            font-weight: 700;
            margin: 0.5rem 0;
        }
        
        .result-total .warning {
            background: rgba(255, 255, 255, 0.2);
            padding: 0.8rem;
            border-radius: 8px;
            margin-top: 1rem;
            font-size: 0.9rem;
        }
        
        .map-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .map-btn {
            padding: 0.8rem 1.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }
        
        .map-btn:hover {
            border-color: var(--accent-blue);
        }
        
        .map-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }
        
        .map-threshold {
            text-align: center;
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 2rem;
            color: var(--text-secondary);
        }
        
        .map-threshold strong {
            color: var(--accent-blue);
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" class="nav-logo">
                <span class="logo-icon">△</span>
                <span>三角眼</span>
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">首页</a>
                <a href="weapon-tier-list.html" class="nav-link">武器评级</a>
                <a href="card-combat-calculator.html" class="nav-link active">卡战备</a>
            </div>
        </div>
    </nav>

    <div class="calculator-container">
        <div class="calculator-header">
            <h1>🎯 卡战备计算器</h1>
            <p>基于实时交易行价格，自动计算战备值，帮你卡着门槛进图</p>
        </div>

        <div id="dataStatus" class="data-status loading">
            ⏳ 正在加载实时价格数据...
        </div>

        <div class="map-selector">
            <button class="map-btn active" data-map="zeroDam_classified">零号大坝-机密</button>
            <button class="map-btn" data-map="zeroDam_topSecret">零号大坝-绝密</button>
            <button class="map-btn" data-map="longbowValley_classified">长弓溪谷-机密</button>
            <button class="map-btn" data-map="spacePort_topSecret">航天基地-绝密</button>
            <button class="map-btn" data-map="baksh_topSecret">巴克什-绝密</button>
            <button class="map-btn" data-map="tidalPrison_topSecret">潮汐监狱-绝密</button>
        </div>

        <div class="map-threshold">
            📊 当前地图门槛：<strong id="thresholdValue">13万</strong> 战备值
        </div>

        <div class="gear-select-grid">
            <div class="gear-select-card">
                <h3>⛑️ 头盔</h3>
                <select id="helmetSelect" onchange="updateGearInfo('helmet')">
                    <option value="">-- 请选择头盔 --</option>
                </select>
                <div id="helmetInfo" class="gear-info"></div>
            </div>

            <div class="gear-select-card">
                <h3>🛡️ 护甲</h3>
                <select id="armorSelect" onchange="updateGearInfo('armor')">
                    <option value="">-- 请选择护甲 --</option>
                </select>
                <div id="armorInfo" class="gear-info"></div>
            </div>

            <div class="gear-select-card">
                <h3>🎒 背包</h3>
                <select id="backpackSelect" onchange="updateGearInfo('backpack')">
                    <option value="">-- 请选择背包 --</option>
                </select>
                <div id="backpackInfo" class="gear-info"></div>
            </div>

            <div class="gear-select-card">
                <h3>👕 胸挂</h3>
                <select id="rigSelect" onchange="updateGearInfo('rig')">
                    <option value="">-- 请选择胸挂 --</option>
                </select>
                <div id="rigInfo" class="gear-info"></div>
            </div>

            <div class="gear-select-card">
                <h3>🔫 主武器</h3>
                <select id="weaponSelect" onchange="updateGearInfo('weapon')">
                    <option value="">-- 请选择主武器 --</option>
                </select>
                <div id="weaponInfo" class="gear-info"></div>
            </div>

            <div class="gear-select-card">
                <h3>🔧 配件</h3>
                <select id="attachmentSelect" onchange="updateGearInfo('attachment')">
                    <option value="">-- 请选择配件 --</option>
                </select>
                <div id="attachmentInfo" class="gear-info"></div>
            </div>
        </div>

        <button class="calculate-btn" id="calculateBtn" onclick="calculateCombat()">
            🎯 计算战备值
        </button>

        <div class="result-section" id="resultSection">
            <h2 class="result-title" id="resultTitle">战备值计算结果</h2>
            <div class="result-grid" id="resultGrid"></div>
            <div class="result-total" id="resultTotal"></div>
        </div>
    </div>

    <script>
        // 地图战备值门槛
        const mapThresholds = {
            'zeroDam_classified': 130000,
            'zeroDam_topSecret': 600000,
            'longbowValley_classified': 130000,
            'spacePort_topSecret': 450000,
            'baksh_topSecret': 450000,
            'tidalPrison_topSecret': 450000
        };

        // 全局数据
        let priceData = [];
        let categorizedData = {};
        let currentMap = 'zeroDam_classified';

        // 页面加载时获取数据
        window.addEventListener('DOMContentLoaded', async () => {
            await loadPriceData();
            setupMapSelector();
        });

        // 加载实时价格数据
        async function loadPriceData() {
            const statusEl = document.getElementById('dataStatus');
            
            try {
                const response = await fetch('/price.json');
                if (!response.ok) throw new Error('Failed to load price data');
                
                priceData = await response.json();
                
                // 按分类整理数据
                categorizeData();
                
                // 填充下拉菜单
                populateSelects();
                
                statusEl.className = 'data-status loaded';
                statusEl.innerHTML = `✅ 实时价格数据加载成功！共 ${priceData.length} 个物品（更新时间：${formatTimestamp(priceData[0]?.is_get_time)}）`;
                
                document.getElementById('calculateBtn').disabled = false;
            } catch (error) {
                statusEl.className = 'data-status error';
                statusEl.innerHTML = `❌ 数据加载失败：${error.message}<br>请检查网络连接或稍后重试`;
                console.error('Price data load error:', error);
            }
        }

        // 按分类整理数据
        function categorizeData() {
            categorizedData = {
                helmets: [],      // 头盔
                armors: [],       // 护甲
                backpacks: [],    // 背包
                rigs: [],         // 胸挂
                weapons: [],      // 武器（步枪、冲锋枪、狙击步枪等）
                attachments: []   // 配件（枪管、枪托、握把、瞄具、弹匣等）
            };

            priceData.forEach(item => {
                const cat = item.secondClassCN;
                if (cat === '头盔') {
                    categorizedData.helmets.push(item);
                } else if (cat === '护甲') {
                    categorizedData.armors.push(item);
                } else if (cat === '背包') {
                    categorizedData.backpacks.push(item);
                } else if (cat === '胸挂') {
                    categorizedData.rigs.push(item);
                } else if (['步枪', '冲锋枪', '狙击步枪', '精确射手步枪', '轻机枪', '手枪', '霰弹枪', '特殊武器'].includes(cat)) {
                    categorizedData.weapons.push(item);
                } else if (['枪管', '枪托', '前握把', '后握把', '护木', '瞄具', '弹匣', '枪口', '功能性配件'].includes(cat)) {
                    categorizedData.attachments.push(item);
                }
            });

            // 按价格排序
            Object.keys(categorizedData).forEach(key => {
                categorizedData[key].sort((a, b) => a.price - b.price);
            });
        }

        // 填充下拉菜单
        function populateSelects() {
            const selects = {
                'helmetSelect': categorizedData.helmets,
                'armorSelect': categorizedData.armors,
                'backpackSelect': categorizedData.backpacks,
                'rigSelect': categorizedData.rigs,
                'weaponSelect': categorizedData.weapons,
                'attachmentSelect': categorizedData.attachments
            };

            Object.entries(selects).forEach(([selectId, items]) => {
                const select = document.getElementById(selectId);
                if (!select) return;
                
                // 保留第一个选项
                const firstOption = select.options[0];
                select.innerHTML = '';
                select.appendChild(firstOption);
                
                // 添加物品选项
                items.forEach(item => {
                    const option = document.createElement('option');
                    option.value = item.id;
                    option.textContent = `${item.name} - ¥${item.price.toLocaleString()}`;
                    option.dataset.price = item.price;
                    option.dataset.name = item.name;
                    select.appendChild(option);
                });
            });
        }

        // 更新装备信息显示
        function updateGearInfo(type) {
            const selectMap = {
                'helmet': 'helmetSelect',
                'armor': 'armorSelect',
                'backpack': 'backpackSelect',
                'rig': 'rigSelect',
                'weapon': 'weaponSelect',
                'attachment': 'attachmentSelect'
            };

            const infoMap = {
                'helmet': 'helmetInfo',
                'armor': 'armorInfo',
                'backpack': 'backpackInfo',
                'rig': 'rigInfo',
                'weapon': 'weaponInfo',
                'attachment': 'attachmentInfo'
            };

            const select = document.getElementById(selectMap[type]);
            const infoDiv = document.getElementById(infoMap[type]);
            
            if (!select || !infoDiv) return;

            const selectedOption = select.options[select.selectedIndex];
            
            if (!selectedOption || !selectedOption.value) {
                infoDiv.classList.remove('show');
                return;
            }

            const price = parseInt(selectedOption.dataset.price);
            const name = selectedOption.dataset.name;
            
            // 估算战备值（价格 × 系数，简化计算）
            const estimatedCombat = Math.round(price * 0.8);

            infoDiv.innerHTML = `
                <p><strong>${name}</strong></p>
                <p>价格：<span class="price">¥${price.toLocaleString()}</span></p>
                <p>估算战备值：约 ${estimatedCombat.toLocaleString()}</p>
            `;
            infoDiv.classList.add('show');
        }

        // 设置地图选择器
        function setupMapSelector() {
            const mapBtns = document.querySelectorAll('.map-btn');
            mapBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    mapBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    currentMap = btn.dataset.map;
                    const threshold = mapThresholds[currentMap];
                    document.getElementById('thresholdValue').textContent = threshold.toLocaleString();
                });
            });
        }

        // 计算战备值
        function calculateCombat() {
            const selectedIds = {
                helmet: document.getElementById('helmetSelect').value,
                armor: document.getElementById('armorSelect').value,
                backpack: document.getElementById('backpackSelect').value,
                rig: document.getElementById('rigSelect').value,
                weapon: document.getElementById('weaponSelect').value,
                attachment: document.getElementById('attachmentSelect').value
            };

            // 检查是否至少选择了一项
            const hasSelection = Object.values(selectedIds).some(v => v);
            if (!hasSelection) {
                alert('请至少选择一件装备！');
                return;
            }

            // 获取选中的物品数据
            const selectedItems = {};
            const selectedNames = {};
            let totalPrice = 0;
            let totalCombat = 0;

            Object.entries(selectedIds).forEach(([type, id]) => {
                if (!id) return;
                
                const item = priceData.find(d => d.id === parseInt(id));
                if (!item) return;
                
                selectedItems[type] = item;
                selectedNames[type] = item.name;
                totalPrice += item.price;
                totalCombat += Math.round(item.price * 0.8); // 简化计算
            });

            // 显示结果
            displayResult(selectedItems, selectedNames, totalCombat, totalPrice);
        }

        // 显示结果
        function displayResult(items, names, totalCombat, totalPrice) {
            const section = document.getElementById('resultSection');
            const titleEl = document.getElementById('resultTitle');
            const gridEl = document.getElementById('resultGrid');
            const totalEl = document.getElementById('resultTotal');

            const threshold = mapThresholds[currentMap];
            const status = totalCombat >= threshold ? '✅ 达标' : '❌ 未达标';
            const statusColor = totalCombat >= threshold ? '#10b981' : '#ef4444';

            titleEl.textContent = `战备值计算结果 - ${status}`;

            gridEl.innerHTML = Object.entries(items).map(([type, item]) => `
                <div class="result-card">
                    <h4>${getTypeName(type)}</h4>
                    <p><strong>${item.name}</strong></p>
                    <p>价格：<span class="value">¥${item.price.toLocaleString()}</span></p>
                    <p>估算战备值：约 ${Math.round(item.price * 0.8).toLocaleString()}</p>
                </div>
            `).join('');

            totalEl.innerHTML = `
                <h3>💰 总计</h3>
                <div class="total-value" style="color: white;">总战备值：约 ${totalCombat.toLocaleString()}</div>
                <div class="total-value" style="color: white; font-size: 1.5rem;">总价格：¥${totalPrice.toLocaleString()}</div>
                <div class="warning">
                    <p>地图门槛：${threshold.toLocaleString()}</p>
                    <p style="color: ${statusColor}; font-weight: bold;">${status}</p>
                    ${totalCombat < threshold ? `<p>还差 ${(threshold - totalCombat).toLocaleString()} 战备值</p>` : ''}
                    ${totalCombat >= threshold ? `<p>超过门槛 ${(totalCombat - threshold).toLocaleString()} 战备值</p>` : ''}
                </div>
            `;

            section.classList.add('active');
            section.scrollIntoView({ behavior: 'smooth' });
        }

        // 获取类型名称
        function getTypeName(type) {
            const names = {
                'helmet': '⛑️ 头盔',
                'armor': '🛡️ 护甲',
                'backpack': '🎒 背包',
                'rig': '👕 胸挂',
                'weapon': '🔫 武器',
                'attachment': '🔧 配件'
            };
            return names[type] || type;
        }

        // 格式化时间戳
        function formatTimestamp(timestamp) {
            if (!timestamp) return '未知';
            const date = new Date(timestamp * 1000);
            return date.toLocaleString('zh-CN');
        }
    </script>
</body>
</html>
