<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡战备计算器 - 三角洲行动战备工具 | 三角眼</title>
    <meta name="description" content="三角洲行动卡战备计算器，手动输入装备计算战备值，或选择推荐方案。支持零号大坝、长弓溪谷、航天基地、巴克什、潮汐监狱等地图。">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👁️</text></svg>">
    <link rel="stylesheet" href="style.css">
    <style>
        .calculator-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .calculator-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .calculator-header h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .calculator-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }
        
        .mode-switch {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .mode-btn {
            padding: 0.8rem 2rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }
        
        .mode-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }
        
        .mode-btn:hover {
            border-color: var(--accent-blue);
        }
        
        .input-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            display: none;
        }
        
        .input-section.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .gear-input-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .gear-input-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }
        
        .gear-input-card h3 {
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--accent-blue);
        }
        
        .input-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            align-items: center;
        }
        
        .input-row label {
            flex: 0 0 100px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .input-row input,
        .input-row select {
            flex: 1;
            padding: 0.6rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 0.95rem;
        }
        
        .input-row input:focus,
        .input-row select:focus {
            outline: none;
            border-color: var(--accent-blue);
        }
        
        .calculate-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
        }
        
        .result-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
            display: none;
        }
        
        .result-section.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .result-header h2 {
            font-size: 1.5rem;
            color: var(--text-primary);
        }
        
        .combat-readiness-display {
            text-align: center;
            padding: 2rem;
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 2rem;
        }
        
        .combat-readiness-value {
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 0.5rem;
        }
        
        .combat-readiness-label {
            color: var(--text-secondary);
            font-size: 1rem;
        }
        
        .gear-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .gear-summary-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }
        
        .gear-summary-card h4 {
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 0.8rem;
        }
        
        .gear-summary-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }
        
        .tips-section {
            background: var(--bg-secondary);
            border-left: 4px solid var(--accent-yellow);
            border-radius: 8px;
            padding: 1.5rem;
            margin-top: 2rem;
        }
        
        .tips-section h3 {
            color: var(--accent-yellow);
            margin-bottom: 1rem;
        }
        
        .tips-section ul {
            list-style: none;
            padding: 0;
        }
        
        .tips-section li {
            color: var(--text-secondary);
            padding: 0.5rem 0;
            padding-left: 1.5rem;
            position: relative;
        }
        
        .tips-section li:before {
            content: "💡";
            position: absolute;
            left: 0;
        }
        
        .recommendation-section {
            display: none;
        }
        
        .recommendation-section.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        .map-select-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 2rem;
        }
        
        .map-select-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .scheme-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .scheme-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-2px);
        }
        
        .scheme-card.selected {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.1);
        }
        
        .scheme-card h4 {
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-bottom: 0.8rem;
        }
        
        .scheme-card p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.3rem;
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <div class="calculator-header">
            <h1>🎯 卡战备计算器</h1>
            <p>手动输入装备计算战备值，或选择推荐方案</p>
        </div>
        
        <div class="mode-switch">
            <button class="mode-btn active" onclick="switchMode('manual')">手动输入模式</button>
            <button class="mode-btn" onclick="switchMode('recommend')">推荐方案模式</button>
        </div>
        
        <!-- 手动输入模式 -->
        <div class="input-section active" id="manualSection">
            <h2 style="margin-bottom: 1.5rem; color: var(--text-primary);">输入装备信息</h2>
            <div class="gear-input-grid">
                <div class="gear-input-card">
                    <h3>⛑️ 头盔</h3>
                    <div class="input-row">
                        <label>装备名称</label>
                        <input type="text" id="helmetName" placeholder="如：破损的DICH训练头盔">
                    </div>
                    <div class="input-row">
                        <label>战备值</label>
                        <input type="number" id="helmetCombat" placeholder="请输入战备值">
                    </div>
                    <div class="input-row">
                        <label>价格（万）</label>
                        <input type="number" id="helmetPrice" step="0.01" placeholder="请输入价格">
                    </div>
                </div>
                
                <div class="gear-input-card">
                    <h3>🛡️ 防弹衣</h3>
                    <div class="input-row">
                        <label>装备名称</label>
                        <input type="text" id="armorName" placeholder="如：TG-H防弹衣">
                    </div>
                    <div class="input-row">
                        <label>战备值</label>
                        <input type="number" id="armorCombat" placeholder="请输入战备值">
                    </div>
                    <div class="input-row">
                        <label>价格（万）</label>
                        <input type="number" id="armorPrice" step="0.01" placeholder="请输入价格">
                    </div>
                </div>
                
                <div class="gear-input-card">
                    <h3>🎒 背包</h3>
                    <div class="input-row">
                        <label>装备名称</label>
                        <input type="text" id="backpackName" placeholder="如：雨林猎手背包">
                    </div>
                    <div class="input-row">
                        <label>战备值</label>
                        <input type="number" id="backpackCombat" placeholder="请输入战备值">
                    </div>
                    <div class="input-row">
                        <label>价格（万）</label>
                        <input type="number" id="backpackPrice" step="0.01" placeholder="请输入价格">
                    </div>
                </div>
                
                <div class="gear-input-card">
                    <h3>👕 胸挂</h3>
                    <div class="input-row">
                        <label>装备名称</label>
                        <input type="text" id="rigName" placeholder="如：GIR野战胸挂">
                    </div>
                    <div class="input-row">
                        <label>战备值</label>
                        <input type="number" id="rigCombat" placeholder="请输入战备值">
                    </div>
                    <div class="input-row">
                        <label>价格（万）</label>
                        <input type="number" id="rigPrice" step="0.01" placeholder="请输入价格">
                    </div>
                </div>
                
                <div class="gear-input-card">
                    <h3>🔫 主武器</h3>
                    <div class="input-row">
                        <label>武器名称</label>
                        <input type="text" id="weaponName" placeholder="如：PKM通用机枪">
                    </div>
                    <div class="input-row">
                        <label>战备值</label>
                        <input type="number" id="weaponCombat" placeholder="请输入战备值">
                    </div>
                    <div class="input-row">
                        <label>价格（万）</label>
                        <input type="number" id="weaponPrice" step="0.01" placeholder="请输入价格">
                    </div>
                </div>
                
                <div class="gear-input-card">
                    <h3>🔧 配件</h3>
                    <div class="input-row">
                        <label>配件总战备值</label>
                        <input type="number" id="attachmentCombat" placeholder="所有配件战备值之和">
                    </div>
                    <div class="input-row">
                        <label>配件总价格（万）</label>
                        <input type="number" id="attachmentPrice" step="0.01" placeholder="所有配件价格之和">
                    </div>
                    <div class="input-row">
                        <label>配件列表</label>
                        <input type="text" id="attachmentList" placeholder="可选：简要列出配件">
                    </div>
                </div>
            </div>
            
            <button class="calculate-btn" onclick="calculateManual()">
                🔍 计算总战备值
            </button>
        </div>
        
        <!-- 推荐方案模式 -->
        <div class="recommendation-section" id="recommendSection">
            <div class="map-select-section">
                <h2 style="margin-bottom: 1.5rem; color: var(--text-primary);">选择地图和难度</h2>
                <div class="map-select-grid" id="mapSelectGrid">
                    <!-- 动态生成地图选项 -->
                </div>
                <button class="calculate-btn" onclick="calculateRecommend()">
                    🔍 查看推荐方案
                </button>
            </div>
        </div>
        
        <!-- 结果展示 -->
        <div class="result-section" id="resultSection">
            <div class="result-header">
                <h2 id="resultTitle">计算结果</h2>
            </div>
            
            <div class="combat-readiness-display">
                <div class="combat-readiness-value" id="totalCombat">0</div>
                <div class="combat-readiness-label">总战备值（万）</div>
            </div>
            
            <div class="gear-summary" id="gearSummary">
                <!-- 动态生成装备摘要 -->
            </div>
            
            <div class="tips-section">
                <h3>💡 卡战备技巧</h3>
                <ul id="tipsList">
                    <li>战备值刚好达到门槛即可，多一分都是浪费</li>
                    <li>优先选择战备值高但价格低的装备</li>
                    <li>破损装备耐久低但战备值不缩水，性价比极高</li>
                    <li>中午购买装备价格可能更低</li>
                </ul>
            </div>
        </div>
    </div>
    
    <script>
        let currentMode = 'manual';
        
        // 切换模式
        function switchMode(mode) {
            currentMode = mode;
            
            // 更新按钮状态
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 显示对应区域
            if (mode === 'manual') {
                document.getElementById('manualSection').classList.add('active');
                document.getElementById('recommendSection').classList.remove('active');
            } else {
                document.getElementById('manualSection').classList.remove('active');
                document.getElementById('recommendSection').classList.add('active');
                loadMapOptions();
            }
            
            // 隐藏结果
            document.getElementById('resultSection').classList.remove('active');
        }
        
        // 加载地图选项
        function loadMapOptions() {
            const grid = document.getElementById('mapSelectGrid');
            const maps = [
                { id: 'zeroDam_classified', name: '零号大坝-机密', threshold: 13 },
                { id: 'longbow_classified', name: '长弓溪谷-机密', threshold: 13 },
                { id: 'spacePort_classified', name: '航天基地-机密', threshold: 18.7 },
                { id: 'spacePort_topSecret', name: '航天基地-绝密', threshold: 45 },
                { id: 'buckish_classified', name: '巴克什-机密', threshold: 18.7 },
                { id: 'buckish_topSecret', name: '巴克什-绝密', threshold: 55 },
                { id: 'tidal_topSecret', name: '潮汐监狱-绝密', threshold: 69 }
            ];
            
            grid.innerHTML = maps.map(map => `
                <div class="scheme-card" onclick="selectMap('${map.id}', ${map.threshold}, this)">
                    <h4>${map.name}</h4>
                    <p>战备值门槛：${map.threshold}万</p>
                </div>
            `).join('');
        }
        
        let selectedMap = null;
        let selectedThreshold = null;
        
        // 选择地图
        function selectMap(mapId, threshold, element) {
            selectedMap = mapId;
            selectedThreshold = threshold;
            
            // 更新选中状态
            document.querySelectorAll('.scheme-card').forEach(card => {
                card.classList.remove('selected');
            });
            element.classList.add('selected');
        }
        
        // 计算手动输入
        function calculateManual() {
            // 收集数据
            const gear = {
                helmet: {
                    name: document.getElementById('helmetName').value || '未装备',
                    combat: parseFloat(document.getElementById('helmetCombat').value) || 0,
                    price: parseFloat(document.getElementById('helmetPrice').value) || 0
                },
                armor: {
                    name: document.getElementById('armorName').value || '未装备',
                    combat: parseFloat(document.getElementById('armorCombat').value) || 0,
                    price: parseFloat(document.getElementById('armorPrice').value) || 0
                },
                backpack: {
                    name: document.getElementById('backpackName').value || '未装备',
                    combat: parseFloat(document.getElementById('backpackCombat').value) || 0,
                    price: parseFloat(document.getElementById('backpackPrice').value) || 0
                },
                rig: {
                    name: document.getElementById('rigName').value || '未装备',
                    combat: parseFloat(document.getElementById('rigCombat').value) || 0,
                    price: parseFloat(document.getElementById('rigPrice').value) || 0
                },
                weapon: {
                    name: document.getElementById('weaponName').value || '未装备',
                    combat: parseFloat(document.getElementById('weaponCombat').value) || 0,
                    price: parseFloat(document.getElementById('weaponPrice').value) || 0
                },
                attachment: {
                    combat: parseFloat(document.getElementById('attachmentCombat').value) || 0,
                    price: parseFloat(document.getElementById('attachmentPrice').value) || 0,
                    list: document.getElementById('attachmentList').value || ''
                }
            };
            
            // 计算总战备值和总价
            const totalCombat = gear.helmet.combat + gear.armor.combat + gear.backpack.combat + 
                             gear.rig.combat + gear.weapon.combat + gear.attachment.combat;
            const totalPrice = gear.helmet.price + gear.armor.price + gear.backpack.price + 
                             gear.rig.price + gear.weapon.price + gear.attachment.price;
            
            // 显示结果
            displayResult('手动输入计算结果', totalCombat, totalPrice, gear);
        }
        
        // 计算推荐方案
        function calculateRecommend() {
            if (!selectedMap) {
                alert('请先选择地图和难度');
                return;
            }
            
            // 预设方案数据
            const schemes = {
                'zeroDam_classified': {
                    gear: {
                        helmet: { name: '户外棒球帽', combat: 0.5, price: 0.1 },
                        armor: { name: '简易防刺服', combat: 3, price: 1.5 },
                        backpack: { name: '战术快拆背包', combat: 2, price: 0.8 },
                        rig: { name: 'G01战术弹挂', combat: 2.5, price: 1.2 },
                        weapon: { name: 'MP5冲锋枪+50发弹鼓', combat: 5, price: 1.5 },
                        attachment: { combat: 3, price: 0.5, list: '基础配件' }
                    },
                    totalCombat: 16,
                    totalPrice: 5.6
                },
                'spacePort_topSecret': {
                    gear: {
                        helmet: { name: '破损的DICH训练头盔', combat: 12, price: 2 },
                        armor: { name: 'TG-H防弹衣（破损）', combat: 15, price: 3 },
                        backpack: { name: '雨林猎手背包', combat: 8, price: 2.5 },
                        rig: { name: 'GIR野战胸挂', combat: 10, price: 3 },
                        weapon: { name: 'PKM通用机枪', combat: 20, price: 14 },
                        attachment: { combat: 10, price: 5, list: '壕战短枪管+堡垒水平补偿器' }
                    },
                    totalCombat: 75,
                    totalPrice: 29.5
                }
                // 其他地图方案...
            };
            
            const scheme = schemes[selectedMap] || schemes['zeroDam_classified'];
            
            displayResult(`${selectedMap} 推荐方案`, scheme.totalCombat, scheme.totalPrice, scheme.gear);
        }
        
        // 显示结果
        function displayResult(title, totalCombat, totalPrice, gear) {
            const section = document.getElementById('resultSection');
            const titleEl = document.getElementById('resultTitle');
            const totalCombatEl = document.getElementById('totalCombat');
            const gearSummary = document.getElementById('gearSummary');
            
            // 更新标题
            titleEl.textContent = title;
            
            // 更新总战备值
            totalCombatEl.textContent = totalCombat.toFixed(1);
            
            // 更新装备摘要
            gearSummary.innerHTML = `
                <div class="gear-summary-card">
                    <h4>⛑️ ${gear.helmet.name}</h4>
                    <p>战备值：${gear.helmet.combat}万</p>
                    <p>价格：${gear.helmet.price}万</p>
                </div>
                <div class="gear-summary-card">
                    <h4>🛡️ ${gear.armor.name}</h4>
                    <p>战备值：${gear.armor.combat}万</p>
                    <p>价格：${gear.armor.price}万</p>
                </div>
                <div class="gear-summary-card">
                    <h4>🎒 ${gear.backpack.name}</h4>
                    <p>战备值：${gear.backpack.combat}万</p>
                    <p>价格：${gear.backpack.price}万</p>
                </div>
                <div class="gear-summary-card">
                    <h4>👕 ${gear.rig.name}</h4>
                    <p>战备值：${gear.rig.combat}万</p>
                    <p>价格：${gear.rig.price}万</p>
                </div>
                <div class="gear-summary-card">
                    <h4>🔫 ${gear.weapon.name}</h4>
                    <p>战备值：${gear.weapon.combat}万</p>
                    <p>价格：${gear.weapon.price}万</p>
                </div>
                <div class="gear-summary-card">
                    <h4>🔧 配件</h4>
                    <p>战备值：${gear.attachment.combat}万</p>
                    <p>价格：${gear.attachment.price}万</p>
                    ${gear.attachment.list ? `<p>列表：${gear.attachment.list}</p>` : ''}
                </div>
                <div class="gear-summary-card" style="grid-column: 1 / -1; background: var(--accent-blue); color: white;">
                    <h4>💰 总计</h4>
                    <p style="font-size: 1.2rem; font-weight: 700;">总战备值：${totalCombat.toFixed(1)}万</p>
                    <p style="font-size: 1.2rem; font-weight: 700;">总价格：${totalPrice.toFixed(1)}万</p>
                </div>
            `;
            
            // 显示结果区域
            section.classList.add('active');
            
            // 滚动到结果区域
            section.scrollIntoView({ behavior: 'smooth' });
        }
        
        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', () => {
            console.log('✅ 卡战备计算器加载完成');
        });
    </script>
</body>
