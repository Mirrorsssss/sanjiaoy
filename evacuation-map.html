<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>撤离路线图 - 三角洲行动攻略</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255, 107, 0, 0.1);
            border: 2px solid #ff6b00;
            border-radius: 15px;
        }

        .header h1 {
            color: #ff6b00;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #888;
            font-size: 1.1em;
        }

        .map-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .map-btn {
            padding: 12px 24px;
            background: rgba(255, 107, 0, 0.2);
            border: 2px solid #ff6b00;
            border-radius: 8px;
            color: #ff6b00;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1em;
            font-weight: bold;
        }

        .map-btn:hover,
        .map-btn.active {
            background: #ff6b00;
            color: #000;
        }

        .map-content {
            display: none;
        }

        .map-content.active {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .map-header {
            background: rgba(255, 107, 0, 0.15);
            border: 2px solid #ff6b00;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .map-header h2 {
            color: #ff6b00;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .map-meta {
            display: flex;
            gap: 30px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .meta-item .label {
            color: #888;
        }

        .meta-item .value {
            color: #ff6b00;
            font-weight: bold;
        }

        .evacuation-points {
            display: grid;
            gap: 25px;
            margin-bottom: 30px;
        }

        .evacuation-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 25px;
            transition: all 0.3s;
        }

        .evacuation-card:hover {
            border-color: #ff6b00;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 107, 0, 0.3);
        }

        .evacuation-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #333;
        }

        .evacuation-name {
            font-size: 1.5em;
            color: #ff6b00;
            font-weight: bold;
        }

        .evacuation-type {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .type-standard {
            background: rgba(76, 175, 80, 0.3);
            color: #4CAF50;
            border: 1px solid #4CAF50;
        }

        .type-keycard {
            background: rgba(255, 193, 7, 0.3);
            color: #FFC107;
            border: 1px solid #FFC107;
        }

        .type-hidden {
            background: rgba(156, 39, 176, 0.3);
            color: #9C27B0;
            border: 1px solid #9C27B0;
        }

        .type-device {
            background: rgba(255, 87, 34, 0.3);
            color: #FF5722;
            border: 1px solid #FF5722;
        }

        .evacuation-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .detail-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        .detail-label {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .detail-value {
            color: #fff;
            font-weight: bold;
            font-size: 1.05em;
        }

        .risk-low { color: #4CAF50; }
        .risk-medium { color: #FFC107; }
        .risk-high { color: #FF5722; }
        .risk-extreme { color: #f44336; }

        .evacuation-route {
            background: rgba(255, 107, 0, 0.1);
            border-left: 4px solid #ff6b00;
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .route-title {
            color: #ff6b00;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .route-steps {
            list-style: none;
            padding: 0;
        }

        .route-steps li {
            padding: 10px 0;
            padding-left: 30px;
            position: relative;
            color: #ccc;
            line-height: 1.6;
        }

        .route-steps li:before {
            content: counter(step);
            counter-increment: step;
            position: absolute;
            left: 0;
            top: 10px;
            width: 22px;
            height: 22px;
            background: #ff6b00;
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85em;
            font-weight: bold;
        }

        .route-steps {
            counter-reset: step;
        }

        .tips-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            margin-top: 30px;
        }

        .tips-title {
            color: #ff6b00;
            font-size: 1.5em;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .tips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }

        .tip-card {
            padding: 15px;
            background: rgba(255, 107, 0, 0.1);
            border-radius: 8px;
            border-left: 3px solid #ff6b00;
        }

        .tip-card h4 {
            color: #ff6b00;
            margin-bottom: 8px;
        }

        .tip-card p {
            color: #ccc;
            font-size: 0.95em;
            line-height: 1.5;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #888;
            font-size: 1.2em;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .map-meta {
                flex-direction: column;
                gap: 15px;
            }

            .evacuation-details {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗺️ 撤离路线图</h1>
            <p>详细的撤离点信息与路线规划 - 确保成功撤离</p>
        </div>

        <div class="map-selector">
            <button class="map-btn active" data-map="zeroDam">零号大坝</button>
            <button class="map-btn" data-map="spacePort">航天基地</button>
            <button class="map-btn" data-map="buckish">巴克什</button>
            <button class="map-btn" data-map="tidalPrison">潮汐监狱</button>
        </div>

        <div id="map-container"></div>
    </div>

    <script>
        let gameMechanicsData = null;

        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('data/game-mechanics.json');
                gameMechanicsData = await response.json();
                initMapSelector();
                showMap('zeroDam');
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('map-container').innerHTML = 
                    '<div class="loading">❌ 加载数据失败，请确保 game-mechanics.json 存在</div>';
            }
        }

        // 初始化地图选择器
        function initMapSelector() {
            const buttons = document.querySelectorAll('.map-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    showMap(btn.dataset.map);
                });
            });
        }

        // 显示地图详情
        function showMap(mapKey) {
            const container = document.getElementById('map-container');
            const mapData = gameMechanicsData.evacuationPoints.maps[mapKey];
            
            if (!mapData) {
                container.innerHTML = '<div class="loading">❌ 未找到地图数据</div>';
                return;
            }

            const difficultyMap = {
                'zeroDam': { text: '简单', color: '#4CAF50' },
                'spacePort': { text: '困难', color: '#FF5722' },
                'buckish': { text: '中等', color: '#FFC107' },
                'tidalPrison': { text: '极难', color: '#f44336' }
            };

            const difficulty = difficultyMap[mapKey] || { text: '未知', color: '#888' };

            let html = `
                <div class="map-content active">
                    <div class="map-header">
                        <h2>${mapData.name}</h2>
                        <div class="map-meta">
                            <div class="meta-item">
                                <span class="label">难度：</span>
                                <span class="value" style="color: ${difficulty.color}">${difficulty.text}</span>
                            </div>
                            <div class="meta-item">
                                <span class="label">撤离点数量：</span>
                                <span class="value">${mapData.points.length}个</span>
                            </div>
                        </div>
                    </div>

                    <div class="evacuation-points">
            `;

            mapData.points.forEach((point, index) => {
                const typeClass = `type-${point.type === '标准撤离' ? 'standard' : 
                                                  point.type === '钥匙卡撤离' ? 'keycard' : 
                                                  point.type === '隐藏撤离' ? 'hidden' : 'device'}`;
                
                const riskClass = `risk-${point.risk === '低' ? 'low' : 
                                            point.risk === '中' ? 'medium' : 
                                            point.risk === '高' ? 'high' : 'extreme'}`;

                const route = getEvacuationRoute(mapKey, index);

                html += `
                    <div class="evacuation-card">
                        <div class="evacuation-header">
                            <div class="evacuation-name">${point.name}</div>
                            <div class="evacuation-type ${typeClass}">${point.type}</div>
                        </div>

                        <div class="evacuation-details">
                            <div class="detail-item">
                                <div class="detail-label">📍 位置</div>
                                <div class="detail-value">${point.location}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">⏱️ 撤离条件</div>
                                <div class="detail-value">${point.condition}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">⚠️ 风险等级</div>
                                <div class="detail-value ${riskClass}">${point.risk}</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">💡 提示</div>
                                <div class="detail-value">${point.note}</div>
                            </div>
                        </div>

                        <div class="evacuation-route">
                            <div class="route-title">📍 推荐撤离路线</div>
                            <ul class="route-steps">
                                ${route.map(step => `<li>${step}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>

                    <div class="tips-section">
                        <div class="tips-title">💡 ${mapData.name} 撤离技巧</div>
                        <div class="tips-grid">
                            ${getMapTips(mapKey).map(tip => `
                                <div class="tip-card">
                                    <h4>${tip.title}</h4>
                                    <p>${tip.content}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML = html;
        }

        // 获取撤离路线
        function getEvacuationRoute(mapKey, pointIndex) {
            const routes = {
                'zeroDam': [
                    [
                        '从行政楼出发，沿左侧小路向西北方向移动',
                        '经过变电站时注意右侧高地可能有狙击手',
                        '到达大坝顶部撤离点，找好掩体等待30秒',
                        '撤离时保持警惕，确认周围安全再进出撤离区'
                    ],
                    [
                        '从宿舍区或行政楼出发，向东南方向移动到地下通道入口',
                        '启动3个发电机（位置：通道入口、中间平台、出口附近）',
                        '启动后等待10秒，撤离门打开',
                        '快速撤离，注意通道内可能有埋伏'
                    ]
                ],
                'spacePort': [
                    [
                        '需要先拉下两个闸门（主控中心和仓库区各一个）',
                        '闸门启动后，前往正门撤离点',
                        '等待45秒，期间找好掩体防御',
                        '建议携带烟雾弹，遮挡敌方视线'
                    ],
                    [
                        '获取后勤通道钥匙卡（击杀BOSS或搜索钥匙房）',
                        '从地图北侧进入后勤通道',
                        '直接使用钥匙卡开启撤离门，等待15秒',
                        '最安全的撤离方式，推荐优先使用'
                    ]
                ],
                'buckish': [
                    [
                        '从商业中心或住宅区向地铁站移动',
                        '地铁站人员密集，建议从侧门进入',
                        '等待30秒，期间注意四周',
                        '高风险撤离点，建议快速清理周围敌人'
                    ],
                    [
                        '找到地下停车场入口（地图西南）',
                        '启动备用电源（通常在一楼控制室）',
                        '电源启动后，撤离门打开',
                        '适合从商业中心带物资撤离'
                    ]
                ],
                'tidalPrison': [
                    [
                        '最难撤离点，需要拉下两个闸门',
                        '从监狱内部向正门移动，路线开阔易被狙击',
                        '等待60秒，建议带满药品和烟雾弹',
                        '如果失败，立即转往海岸警卫队撤离点'
                    ],
                    [
                        '获取海岸警卫队钥匙卡（监狱长办公室或BOSS掉落）',
                        '从监狱向东侧海岸移动，路线相对安全',
                        '使用钥匙卡开启撤离门，等待20秒',
                        '相对安全的撤离点，推荐作为备用方案'
                    ]
                ]
            };

            return routes[mapKey] ? routes[mapKey][pointIndex] || ['路线规划开发中...'] : ['路线规划开发中...'];
        }

        // 获取地图技巧
        function getMapTips(mapKey) {
            const tips = {
                'zeroDam': [
                    { title: '🎯 首选撤离点', content: '大坝顶部撤离点最安全，适合新手。地下通道适合快速撤离，但需要提前启动发电机。' },
                    { title: '⚠️ 注意事项', content: '地下通道撤退时要注意噪音，发电机启动声音会暴露位置。' },
                    { title: '💼 物资建议', content: '零号大坝物资价值中等，建议携带中等容量背包（15-18格）。' }
                ],
                'spacePort': [
                    { title: '🎯 拉闸顺序', content: '建议先拉主控中心闸门，再拉仓库区闸门。拉闸后快速移动到正门撤离点。' },
                    { title: '🔑 钥匙卡优先', content: '后勤通道钥匙卡是航天基地最安全的撤离方式，优先获取。' },
                    { title: '⚠️ 高风险提醒', content: '航天基地竞争激烈，撤离时至少有1人放哨，防止被偷袭。' }
                ],
                'buckish': [
                    { title: '🎯 避开地铁站', content: '地铁站撤离点风险过高，建议优先使用地下停车场撤离点。' },
                    { title: '💡 隐蔽路线', content: '从住宅区沿小巷移动到地下停车场，避开商业中心主路。' },
                    { title: '🛡️ 防御准备', content: '巴克什巷战居多，建议携带霰弹枪或冲锋枪，近战优势明显。' }
                ],
                'tidalPrison': [
                    { title: '🎯 双撤离点策略', content: '优先尝试海岸警卫队撤离点，如果被封锁再转正面撤离点。' },
                    { title: '⏰ 时间管理', content: '潮汐监狱撤离时间最长（60秒），建议提前规划路线，留出充足时间。' },
                    { title: '💪 装备建议', content: '绝密地图建议战备值达到69万以上，确保装备足够应对高强度战斗。' }
                ]
            };

            return tips[mapKey] || [];
        }

        // 页面加载时初始化
        window.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
