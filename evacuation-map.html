        .header h1 {

        .mode-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .mode-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #555;
            border-radius: 8px;
            color: #888;

        .mode-btn:hover {
            border-color: #ff6b00;

            padding: 12px 24px;
            background: rgba(255, 107, 0, 0.2);
            border: 2px solid #ff6b00;
            border-radius: 8px;
            color: #ff6b00;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1em;
            font-weight: bold;
        }

        .map-btn:hover,
        .map-btn.active {
            background: #ff6b00;
            color: #000;
        }

        /* 互动地图区域 */
        .interactive-map {
            position: relative;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid #333;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
            min-height: 500px;
        }

        .map-canvas-container {
            position: relative;
            width: 100%;
            height: 500px;
            cursor: grab;
            overflow: hidden;
        }

        .map-canvas-container.dragging {
            cursor: grabbing;
        }

        #mapCanvas {
            position: absolute;
            left: 50%;
            top: 50%;
            transform-origin: center center;
        }

        /* 缩放控制 */
        .zoom-controls {
            position: absolute;
            right: 20px;
            top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        .zoom-btn {
            width: 44px;
            height: 44px;
            background: rgba(255, 107, 0, 0.8);
            border: 2px solid #ff6b00;
            border-radius: 8px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .zoom-btn:hover {
            background: #ff6b00;
            transform: scale(1.1);
        }

        .zoom-level {
            text-align: center;
            color: #ff6b00;
            font-size: 12px;
            background: rgba(0, 0, 0, 0.6);

            border: 2px solid #555;
            border-radius: 6px;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;

            align-items: center;
            gap: 6px;

            border-color: #ff6b00;
            color: #ff6b00;

            width: 10px;

            border-radius: 8px;
            padding: 15px;
            z-index: 10;

        .legend-title {
            color: #888;
            font-size: 0.85em;
            margin-bottom: 10px;

            align-items: center;
            gap: 8px;
            padding: 4px 0;
            font-size: 0.8em;

        .legend-icon {

            height: 16px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;

            left: 0;
            right: 0;
            bottom: 0;

                { name: '材料堆', type: 'material', x: 330000, y: -680000, icon: '📦', loot: '稀有材料', value: '极高' }
            ]
        };

        // 撤离点数据
        const evacuationPoints = {
            zeroDam: [
                { name: '大坝顶部撤离点', type: 'standard', note: '标准撤离，无需条件', risk: '低' },
                { name: '地下通道撤离', type: 'keycard', note: '需要启动发电机', risk: '中' },
                { name: '备用撤离点', type: 'packdrop', note: '丢包撤离，需限时到达', risk: '中' }
            ],
            longbowValley: [
                { name: '蓝港码头撤离', type: 'standard', note: '标准撤离点', risk: '低' },
                { name: '雷达站撤离', type: 'keycard', note: '需要钥匙卡', risk: '中' },
                { name: '检查站丢包', type: 'packdrop', note: '丢包撤离', risk: '中' }
            ],
            spacePort: [
                { name: '正门撤离', type: 'device', note: '需要拉两个闸门', risk: '高' },
                { name: '后勤通道撤离', type: 'keycard', note: '需要后勤钥匙卡', risk: '低' }
            ],
            buckish: [
                { name: '地铁站撤离', type: 'standard', note: '标准撤离', risk: '高' },
                { name: '停车场撤离', type: 'device', note: '需要启动电源', risk: '中' }
            ],
            tidalPrison: [
                { name: '正门撤离', type: 'device', note: '需要拉两个闸门，等待60秒', risk: '极高' },
                { name: '海岸警卫队撤离', type: 'keycard', note: '需要海岸警卫队钥匙卡', risk: '中' }
            ],
            nuclearPlant: [
                { name: '主出口撤离', type: 'device', note: '需要完成电站任务', risk: '高' },
                { name: '员工通道撤离', type: 'keycard', note: '需要员工钥匙卡', risk: '中' }
            ]
        };

        // 提示数据
        const mapTips = {
            zeroDam: [
                { title: '🎯 首选撤离点', content: '大坝顶部撤离点最安全，适合新手。地下通道适合快速撤离。' },
                { title: '⚠️ 注意事项', content: '地下通道撤退时要注意噪音，发电机启动声音会暴露位置。' },
                { title: '💼 物资建议', content: '零号大坝物资价值中等，建议携带中等容量背包（15-18格）。' }
            ],
            longbowValley: [
                { title: '🐍 蝰蛇首领', content: '蝰蛇首领位于加尔比旧址附近，击败后可获得高价值掉落。' },
                { title: '🎯 首选撤离点', content: '蓝港码头撤离点相对安全，从雷达站方向撤离可避开冲突区域。' },
                { title: '⚠️ 地形提醒', content: '长弓溪谷地形开阔，狙击手优势明显。' }
            ],
            spacePort: [
                { title: '🎯 拉闸顺序', content: '建议先拉主控中心闸门，再拉仓库区闸门。' },
                { title: '🔑 钥匙卡优先', content: '后勤通道钥匙卡是航天基地最安全的撤离方式。' }
            ],
            buckish: [
                { title: '🎯 避开地铁站', content: '地铁站撤离点风险过高，建议优先使用地下停车场撤离点。' },
                { title: '🛡️ 防御准备', content: '巴克什巷战居多，建议携带霰弹枪或冲锋枪。' }
            ],
            tidalPrison: [
                { title: '🎯 双撤离点策略', content: '优先尝试海岸警卫队撤离点，如果被封锁再转正面撤离点。' },
                { title: '⏰ 时间管理', content: '潮汐监狱撤离时间最长（60秒），建议提前规划路线。' }
            ],
            nuclearPlant: [
                { title: '⚠️ 高风险区域', content: '核电站为S9新增地图，竞争激烈，建议组队前往。' },
                { title: '🎯 任务优先', content: '优先完成电站任务可解锁更安全的撤离路线。' }
            ]
        };

        // Canvas引用
        const canvas = document.getElementById('mapCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('mapContainer');

        // 初始化
        function init() {
            setupCanvas();
            setupEventListeners();
            renderEvacuationList();
            renderSupplyGrid();
            renderTips();
            drawMap();
        }

        // 设置Canvas
        function setupCanvas() {
            const rect = container.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        // 绘制地图
        function drawMap() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制背景网格
            drawGrid();
            
            // 绘制地图边界
            drawMapBounds();
            
            // 绘制物资点位
            drawSupplyPoints();
            
            // 绘制撤离点
            drawEvacuationMarkers();
        }

        // 绘制网格
        function drawGrid() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            
            const gridSize = 50 * zoom;
            const offsetX = (canvas.width / 2 + panX) % gridSize;
            const offsetY = (canvas.height / 2 + panY) % gridSize;
            
            for (let x = offsetX; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            for (let y = offsetY; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        // 绘制地图边界
        function drawMapBounds() {
            const config = mapConfigs[currentMap];
            const scale = zoom * 0.002;
            
            ctx.save();
            ctx.translate(canvas.width / 2 + panX, canvas.height / 2 + panY);
            
            // 绘制地图区域
            ctx.fillStyle = 'rgba(255, 107, 0, 0.1)';
            ctx.strokeStyle = 'rgba(255, 107, 0, 0.5)';
            ctx.lineWidth = 2;
            
            const w = config.boundsW * scale;
            const h = config.boundsH * scale;
            
            ctx.beginPath();
            ctx.roundRect(-w / 2, -h / 2, w, h, 10);
            ctx.fill();
            ctx.stroke();
            
            // 绘制地图名称
            ctx.fillStyle = 'rgba(255, 107, 0, 0.3)';
            ctx.font = `${24 * zoom}px Segoe UI`;
            ctx.textAlign = 'center';
            ctx.fillText(config.name, 0, 0);
            
            ctx.restore();
        }

        // 绘制物资点位
        function drawSupplyPoints() {
            const points = supplyPoints[currentMap] || [];
            const filteredPoints = currentCategory === 'all' 
                ? points 
                : points.filter(p => p.type === currentCategory);
            
            const config = mapConfigs[currentMap];
            const scale = zoom * 0.003;
            
            filteredPoints.forEach(point => {
                const x = canvas.width / 2 + panX + (point.x - config.centerX) * scale;
                const y = canvas.height / 2 + panY + (point.y - config.centerY) * scale;
                
                const color = getTypeColor(point.type);
                
                // 绘制点位
                ctx.beginPath();
                ctx.arc(x, y, 12 * zoom, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 绘制图标
                ctx.font = `${14 * zoom}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(point.icon, x, y);
                
                // 绘制标签
                ctx.font = `${10 * zoom}px Segoe UI`;
                ctx.fillStyle = '#fff';
                ctx.fillText(point.name, x, y + 20 * zoom);
            });
        }

        // 绘制撤离点标记
        function drawEvacuationMarkers() {
            const points = evacuationPoints[currentMap] || [];
            const config = mapConfigs[currentMap];
            const scale = zoom * 0.002;
            
            // 固定撤离点位置
            const evacPositions = [
                { x: config.centerX + config.boundsW * 0.3, y: config.centerY + config.boundsH * 0.4 },
                { x: config.centerX - config.boundsW * 0.3, y: config.centerY - config.boundsH * 0.3 },
                { x: config.centerX, y: config.centerY - config.boundsH * 0.4 }
            ];
            
            points.forEach((point, i) => {
                const pos = evacPositions[i] || evacPositions[0];
                const x = canvas.width / 2 + panX + (pos.x - config.centerX) * scale;
                const y = canvas.height / 2 + panY + (pos.y - config.centerY) * scale;
                
                // 绘制撤离点
                ctx.beginPath();
                ctx.arc(x, y, 16 * zoom, 0, Math.PI * 2);
                ctx.fillStyle = '#9C27B0';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // 绘制图标
                ctx.font = `${16 * zoom}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('💎', x, y);
                
                // 绘制标签
                ctx.font = `${10 * zoom}px Segoe UI`;
                ctx.fillStyle = '#9C27B0';
                ctx.fillText(point.name, x, y + 24 * zoom);
            });
        }

        // 获取类型颜色
        function getTypeColor(type) {
            const colors = {
                weapon: '#f44336',
                medical: '#4CAF50',
                accessory: '#2196F3',
                material: '#FFC107'
            };
            return colors[type] || '#888';
        }

        // 获取类型图标
        function getTypeIcon(type) {
            const icons = {
                weapon: '🔫',
                medical: '💊',
                accessory: '🔧',
                material: '📦'
            };
            return icons[type] || '📦';
        }

        // 获取类型名称
        function getTypeName(type) {
            const names = {
                weapon: '武器',
                medical: '医疗',
                accessory: '配件',
                material: '材料'
            };
            return names[type] || type;
        }

        // 设置事件监听
        function setupEventListeners() {
            // 缩放控制
            document.getElementById('zoomIn').addEventListener('click', () => {
                zoom = Math.min(zoom + 0.2, 3);
                updateZoomLevel();
                drawMap();
            });

            document.getElementById('zoomOut').addEventListener('click', () => {
                zoom = Math.max(zoom - 0.2, 0.4);
                updateZoomLevel();
                drawMap();
            });

            // 鼠标滚轮缩放
            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                if (e.deltaY < 0) {
                    zoom = Math.min(zoom + 0.1, 3);
                } else {
                    zoom = Math.max(zoom - 0.1, 0.4);
                }
                updateZoomLevel();
                drawMap();
            });

            // 拖拽平移
            container.addEventListener('mousedown', (e) => {
                isDragging = true;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                container.classList.add('dragging');
            });

            window.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - lastMouseX;
                    const deltaY = e.clientY - lastMouseY;
                    panX += deltaX;
                    panY += deltaY;
                    lastMouseX = e.clientX;
                    lastMouseY = e.clientY;
                    drawMap();
                }
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
                container.classList.remove('dragging');
            });

            // 点击物资点位
            canvas.addEventListener('click', (e) => {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const clickedPoint = findClickedPoint(x, y);
                if (clickedPoint) {
                    showPopup(clickedPoint);
                }
            });

            // 模式切换
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentMode = btn.dataset.mode;
                    renderSupplyGrid();
                });
            });

            // 地图切换
            document.querySelectorAll('.map-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.map-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentMap = btn.dataset.map;
                    zoom = 1;
                    panX = 0;
                    panY = 0;
                    updateZoomLevel();
                    renderEvacuationList();
                    renderSupplyGrid();
                    renderTips();
                    drawMap();
                });
            });

            // 分类切换
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentCategory = tab.dataset.category;
                    drawMap();
                });
            });

            // 弹窗关闭
            document.getElementById('popupClose').addEventListener('click', closePopup);
            document.getElementById('popupOverlay').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) {
                    closePopup();
                }
            });

            // 窗口大小变化
            window.addEventListener('resize', () => {
                setupCanvas();
                drawMap();
            });
        }

        // 更新缩放级别显示
        function updateZoomLevel() {
            document.getElementById('zoomLevel').textContent = Math.round(zoom * 100) + '%';
        }

        // 查找点击的点位
        function findClickedPoint(x, y) {
            const points = supplyPoints[currentMap] || [];
            const config = mapConfigs[currentMap];
            const scale = zoom * 0.003;
            
            for (const point of points) {
                const px = canvas.width / 2 + panX + (point.x - config.centerX) * scale;
                const py = canvas.height / 2 + panY + (point.y - config.centerY) * scale;
                
                const distance = Math.sqrt((x - px) ** 2 + (y - py) ** 2);
                if (distance < 20 * zoom) {
                    return point;
                }
            }
            return null;
        }

        // 显示弹窗
        function showPopup(point) {
            const overlay = document.getElementById('popupOverlay');
            const title = document.getElementById('popupTitle');
            const content = document.getElementById('popupContent');
            
            title.innerHTML = `<span style="font-size: 24px;">${point.icon}</span> ${point.name}`;
            
            content.innerHTML = `
                <div class="popup-item">
                    <span class="popup-label">类型</span>
                    <span class="popup-value">${getTypeName(point.type)}</span>
                </div>
                <div class="popup-item">
                    <span class="popup-label">坐标</span>
                    <span class="popup-value">X: ${point.x}, Y: ${point.y}</span>
                </div>
                <div class="popup-item">
                    <span class="popup-label">预计掉落</span>
                    <span class="popup-value">${point.loot}</span>
                </div>
                <div class="popup-item">
                    <span class="popup-label">价值等级</span>
                    <span class="popup-value" style="color: ${point.value === '极高' ? '#f44336' : point.value === '高' ? '#ff6b00' : '#4CAF50'}">
                        ${point.value}
                    </span>
                </div>
                <div class="popup-tags">
                    <span class="popup-tag" style="background: ${getTypeColor(point.type)}20; color: ${getTypeColor(point.type)}; border: 1px solid ${getTypeColor(point.type)}">
                        ${getTypeIcon(point.type)} ${getTypeName(point.type)}
                    </span>
                </div>
            `;
            
            overlay.classList.add('show');
        }

        // 关闭弹窗
        function closePopup() {
            document.getElementById('popupOverlay').classList.remove('show');
        }

        // 渲染撤离点列表
        function renderEvacuationList() {
            const list = document.getElementById('evacuationList');
            const points = evacuationPoints[currentMap] || [];
            
            list.innerHTML = points.map(point => `
                <div class="evacuation-card">
                    <div class="evacuation-name">${point.name}</div>
                    <span class="evacuation-type type-${point.type}">${getEvacTypeName(point.type)}</span>
                    <div class="evacuation-note">${point.note}</div>
                    <div style="margin-top: 8px; font-size: 0.85em;">
                        <span style="color: ${point.risk === '低' ? '#4CAF50' : point.risk === '中' ? '#FFC107' : '#f44336'}">
                            ⚠️ ${point.risk}风险
                        </span>
                    </div>
                </div>
            `).join('');
        }

        // 获取撤离类型名称
        function getEvacTypeName(type) {
            const names = {
                standard: '标准撤离',
                keycard: '钥匙卡撤离',
                hidden: '隐藏撤离',
                device: '条件撤离',
                packdrop: '丢包撤离'
            };
            return names[type] || type;
        }

        // 渲染物资网格
        function renderSupplyGrid() {
            const grid = document.getElementById('supplyGrid');
            const points = supplyPoints[currentMap] || [];
            
            grid.innerHTML = points.map(point => `
                <div class="supply-item" data-point='${JSON.stringify(point)}'>
                    <div class="supply-icon">${point.icon}</div>
                    <div class="supply-name">${point.name}</div>
                    <div class="supply-type">${getTypeName(point.type)} | ${point.value}价值</div>
                </div>
            `).join('');
            
            // 添加点击事件
            grid.querySelectorAll('.supply-item').forEach(item => {
                item.addEventListener('click', () => {
                    const point = JSON.parse(item.dataset.point);
                    showPopup(point);
                });
            });
        }

        // 渲染提示
        function renderTips() {
            const grid = document.getElementById('tipsGrid');
            const tips = mapTips[currentMap] || [];
            
            grid.innerHTML = tips.map(tip => `
                <div class="tip-card">
                    <h4>${tip.title}</h4>
                    <p>${tip.content}</p>
                </div>
            `).join('');
        }

        // 页面加载
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
