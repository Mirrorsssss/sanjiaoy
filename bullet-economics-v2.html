<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工坊利润计算器 - 三角眼</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, rgba(255,107,0,0.2) 0%, rgba(255,107,0,0.05) 100%);
            border-bottom: 3px solid #ff6b00;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .header a { color: #ff6b00; text-decoration: none; font-size: 1.2em; }
        .header h1 { color: #ff6b00; font-size: 1.8em; }
        .header p { color: #888; font-size: 0.9em; margin-top: 4px; }
        .container { max-width: 1300px; margin: 0 auto; padding: 30px 20px; }

        /* 顶部摘要 */
        .summary-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .summary-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 16px 20px;
            text-align: center;
        }
        .summary-card .val {
            font-size: 1.6em;
            font-weight: bold;
            color: #4caf50;
        }
        .summary-card .lbl { color: #888; font-size: 0.85em; margin-top: 4px; }

        /* 控制区 */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            align-items: center;
        }
        .controls input, .controls select {
            background: rgba(255,255,255,0.08);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px 14px;
            color: #e0e0e0;
            font-size: 0.95em;
            outline: none;
        }
        .controls input:focus, .controls select:focus { border-color: #ff6b00; }
        .controls input { width: 220px; }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn-primary { background: #ff6b00; color: #000; }
        .btn-primary:hover { background: #ff8c00; }
        .btn-ghost { background: transparent; border: 1px solid #555; color: #aaa; }
        .btn-ghost:hover { border-color: #ff6b00; color: #ff6b00; }

        /* 配方卡片 */
        .recipe-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
        }
        .recipe-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            position: relative;
        }
        .recipe-card:hover { border-color: #ff6b00; transform: translateY(-3px); box-shadow: 0 8px 24px rgba(255,107,0,0.25); }
        .recipe-card.rank-1 { border-color: #ffd700; box-shadow: 0 0 16px rgba(255,215,0,0.2); }
        .recipe-card.rank-2 { border-color: #c0c0c0; }
        .recipe-card.rank-3 { border-color: #cd7f32; }
        .recipe-card.s9 { border-left: 4px solid #00c8ff; }

        .rank-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9em;
        }
        .rank-1 .rank-badge { background: #ffd700; color: #000; }
        .rank-2 .rank-badge { background: #c0c0c0; color: #000; }
        .rank-3 .rank-badge { background: #cd7f32; color: #000; }

        .recipe-name {
            font-size: 1.15em;
            font-weight: bold;
            color: #fff;
            margin-bottom: 6px;
            padding-right: 40px;
        }
        .s9-tag {
            background: rgba(0,200,255,0.15);
            border: 1px solid #00c8ff;
            color: #00c8ff;
            font-size: 0.75em;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 6px;
        }

        .recipe-meta {
            color: #888;
            font-size: 0.85em;
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .recipe-meta span::before { content: "• "; }

        .profit-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .profit-row:last-child { border-bottom: none; }
        .profit-row .label { color: #aaa; font-size: 0.9em; }
        .profit-row .value { font-weight: bold; }
        .value.green { color: #4caf50; }
        .value.orange { color: #ff6b00; }
        .value.gold { color: #ffd700; }
        .value.na { color: #666; }

        /* 进度条 */
        .profit-bar-wrap { margin: 12px 0 6px; }
        .profit-bar-bg {
            background: rgba(255,255,255,0.08);
            border-radius: 4px;
            height: 6px;
            overflow: hidden;
        }
        .profit-bar-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            transition: width 0.6s ease;
        }

        /* 材料列表 */
        .materials-toggle {
            margin-top: 12px;
            color: #ff6b00;
            font-size: 0.85em;
            cursor: pointer;
            user-select: none;
        }
        .materials-toggle:hover { text-decoration: underline; }
        .materials-list {
            display: none;
            margin-top: 8px;
            padding: 10px;
            background: rgba(0,0,0,0.25);
            border-radius: 8px;
        }
        .materials-list.open { display: block; }
        .mat-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.85em;
            color: #bbb;
        }
        .mat-bound { color: #888; }
        .mat-tradable { color: #64b5f6; }

        /* 价格输入区 */
        .price-editor {
            background: rgba(255,255,255,0.04);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
        }
        .price-editor h3 { color: #ff6b00; margin-bottom: 16px; font-size: 1.1em; }
        .price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }
        .price-item { display: flex; flex-direction: column; gap: 4px; }
        .price-item label { font-size: 0.85em; color: #aaa; }
        .price-item input {
            background: rgba(255,255,255,0.08);
            border: 1px solid #444;
            border-radius: 6px;
            padding: 8px 10px;
            color: #e0e0e0;
            outline: none;
            width: 100%;
        }
        .price-item input:focus { border-color: #ff6b00; }

        /* 说明区 */
        .tips-box {
            background: rgba(255,107,0,0.06);
            border: 1px solid rgba(255,107,0,0.3);
            border-radius: 10px;
            padding: 16px 20px;
            margin-top: 30px;
            font-size: 0.9em;
            color: #bbb;
            line-height: 1.8;
        }
        .tips-box strong { color: #ff6b00; }

        /* 排序控制 */
        .sort-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .sort-tab {
            padding: 7px 16px;
            border-radius: 20px;
            border: 1px solid #444;
            background: transparent;
            color: #aaa;
            cursor: pointer;
            font-size: 0.88em;
            transition: all 0.2s;
        }
        .sort-tab.active { background: #ff6b00; border-color: #ff6b00; color: #000; font-weight: bold; }
        .sort-tab:hover:not(.active) { border-color: #ff6b00; color: #ff6b00; }

        .section-title { color: #ff6b00; font-size: 1.2em; font-weight: bold; margin-bottom: 16px; }

        @media (max-width: 600px) {
            .recipe-grid { grid-template-columns: 1fr; }
            .controls input { width: 100%; }
        }
    </style>
</head>
<body>
<div class="header">
    <a href="index.html">← 返回</a>
    <div>
        <h1>💰 工坊利润计算器</h1>
        <p>S9「回声」赛季 · 税率13%（手续费10% + 保证金3%）· 公式：利润 = 售价 × 0.87 - 材料成本</p>
    </div>
</div>
<div class="container">

    <!-- 统计摘要 -->
    <div class="summary-bar" id="summaryBar"></div>

    <!-- 可交易材料价格设置 -->
    <div class="price-editor">
        <h3>⚙️ 材料市价设置（可交易材料，影响利润计算）</h3>
        <div class="price-grid" id="priceGrid"></div>
        <div style="margin-top:14px; display:flex; gap:10px;">
            <button class="btn btn-primary" onclick="recalculate()">🔄 重新计算</button>
            <button class="btn btn-ghost" onclick="resetPrices()">恢复默认</button>
        </div>
    </div>

    <!-- 搜索 & 排序 -->
    <div class="controls">
        <input type="text" id="searchBox" placeholder="🔍 搜索配方名称…" oninput="renderRecipes()">
        <select id="filterGrade" onchange="renderRecipes()">
            <option value="">全部等级</option>
            <option value="1">⬜ 1级（普通）</option>
            <option value="2">🟩 2级（优秀）</option>
            <option value="3">🟦 3级（稀有）</option>
            <option value="4">🟪 4级（史诗）</option>
            <option value="5">🟨 5级（传说）</option>
        </select>
        <select id="filterType" onchange="renderRecipes()">
            <option value="">全部类型</option>
            <option value="s9">S9新增</option>
            <option value="old">常规配方</option>
        </select>
    </div>
    <div class="sort-tabs">
        <button class="sort-tab active" onclick="setSort('hourly')">⏱ 时效利润优先</button>
        <button class="sort-tab" onclick="setSort('total')">💰 总利润优先</button>
        <button class="sort-tab" onclick="setSort('grade')">⭐ 等级优先</button>
        <button class="sort-tab" onclick="setSort('name')">🔤 名称排序</button>
    </div>

    <!-- 配方卡片区 -->
    <div class="section-title" id="recipeCount"></div>
    <div class="recipe-grid" id="recipeGrid"></div>

    <!-- 策略说明 -->
    <div class="tips-box">
        <strong>📌 快速指南</strong><br>
        • <strong>最赚钱（时效）</strong>：T3肾上腺素 · 动力外骨骼Mk-II组件 · T3破片手雷<br>
        • <strong>新手推荐</strong>：T1医疗包（绑定材料，零成本），T2烟雾弹（稳定需求）<br>
        • <strong>最佳出售时间</strong>：晚上 8-11 点（玩家高峰），周末价格普遍更高<br>
        • <strong>注意</strong>：制造完成后有 5 分钟冷却时间，批量制造请计入时间成本
    </div>
</div>

<script>
// ===================== 数据 =====================
const WORKSHOP_DATA = {
  taxRate: 0.13,
  craftingRecipes: [
    {
      id: "recipe_001", name: "T1医疗包", grade: 1, isS9: false,
      materials: [
        { item: "绷带", qty: 2, tradable: false },
        { item: "消毒剂", qty: 1, tradable: false }
      ],
      craftTime: 10, sellPrice: 65000,
      recommendation: "新手推荐，材料易得，绑定材料零成本"
    },
    {
      id: "s9_001", name: "XCOG 3.5倍战术瞄准镜", grade: 4, isS9: true,
      materials: [
        { item: "光学镜片", qty: 2, tradable: true },
        { item: "精密元件", qty: 3, tradable: true },
        { item: "高级合金", qty: 2, tradable: true }
      ],
      craftTime: 45, sellPrice: 1000000,
      recommendation: "高端玩家推荐，工坊独家配方，稀缺度高"
    },
    {
      id: "s9_002", name: "钛合金板", grade: 3, isS9: true,
      materials: [
        { item: "高级合金", qty: 3, tradable: true },
        { item: "稀有金属", qty: 2, tradable: true }
      ],
      craftTime: 30, sellPrice: 200000,
      recommendation: "中等预算推荐，S9新增防具材料，需求稳定"
    },
    {
      id: "s9_003", name: "动力外骨骼Mk-II组件", grade: 5, isS9: true,
      materials: [
        { item: "高级合金", qty: 5, tradable: true },
        { item: "精密元件", qty: 4, tradable: true },
        { item: "稀有金属", qty: 3, tradable: true }
      ],
      craftTime: 90, sellPrice: 2500000,
      recommendation: "S9核心装备，极高需求，材料成本高"
    },
    {
      id: "recipe_002", name: "T2能量饮料", grade: 2, isS9: false,
      materials: [
        { item: "T1能量饮料", qty: 2, tradable: false },
        { item: "兴奋剂", qty: 1, tradable: false }
      ],
      craftTime: 15, sellPrice: 150000,
      recommendation: "高利润，绑定材料零成本"
    },
    {
      id: "recipe_003", name: "T3肾上腺素", grade: 3, isS9: false,
      materials: [
        { item: "T2肾上腺素", qty: 2, tradable: false },
        { item: "高级激素", qty: 1, tradable: false }
      ],
      craftTime: 20, sellPrice: 300000,
      recommendation: "时效最高利润，但材料稀有"
    },
    {
      id: "recipe_004", name: "T2烟雾弹", grade: 2, isS9: false,
      materials: [
        { item: "T1烟雾弹", qty: 2, tradable: false },
        { item: "发烟剂", qty: 1, tradable: false }
      ],
      craftTime: 12, sellPrice: 100000,
      recommendation: "战术装备，需求稳定"
    },
    {
      id: "recipe_005", name: "T3破片手雷", grade: 3, isS9: false,
      materials: [
        { item: "T2破片手雷", qty: 2, tradable: false },
        { item: "高性能炸药", qty: 1, tradable: false }
      ],
      craftTime: 18, sellPrice: 240000,
      recommendation: "高需求消耗品，利润可观"
    }
  ]
};

// 默认市价（可交易材料）
const DEFAULT_PRICES = {
  "光学镜片": 15000,
  "精密元件": 12000,
  "高级合金": 8000,
  "稀有金属": 5000
};

let materialPrices = { ...DEFAULT_PRICES };
let currentSort = 'hourly';

// ===================== 计算函数 =====================
function calcProfit(recipe) {
  let materialCost = 0;
  let hasTradable = false;
  recipe.materials.forEach(m => {
    if (m.tradable) {
      materialCost += (materialPrices[m.item] || 0) * m.qty;
      hasTradable = true;
    }
  });

  const netSell = recipe.sellPrice * 0.87;
  const profit = hasTradable ? netSell - materialCost : netSell;
  const hourlyProfit = (profit / recipe.craftTime) * 60;
  const roi = hasTradable && materialCost > 0
    ? ((profit / materialCost) * 100).toFixed(0)
    : 'N/A（绑定材料）';

  return { profit, hourlyProfit, materialCost, roi, hasTradable };
}

// ===================== 初始化 =====================
function init() {
  renderPriceGrid();
  recalculate();
}

function renderPriceGrid() {
  const grid = document.getElementById('priceGrid');
  grid.innerHTML = Object.keys(DEFAULT_PRICES).map(item => `
    <div class="price-item">
      <label>${item}</label>
      <input type="number" id="price_${item}" value="${materialPrices[item]}"
        min="0" step="100" placeholder="市价（RMB）">
    </div>
  `).join('');
}

function recalculate() {
  Object.keys(DEFAULT_PRICES).forEach(item => {
    const el = document.getElementById('price_' + item);
    if (el) materialPrices[item] = parseInt(el.value) || 0;
  });
  renderSummary();
  renderRecipes();
}

function resetPrices() {
  materialPrices = { ...DEFAULT_PRICES };
  renderPriceGrid();
  recalculate();
}

function setSort(s) {
  currentSort = s;
  document.querySelectorAll('.sort-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderRecipes();
}

// ===================== 摘要栏 =====================
function renderSummary() {
  const results = WORKSHOP_DATA.craftingRecipes.map(r => ({ ...r, ...calcProfit(r) }));
  const sorted = results.sort((a, b) => b.hourlyProfit - a.hourlyProfit);
  const best = sorted[0];

  const totalItems = results.length;
  const avgHourly = results.reduce((s, r) => s + r.hourlyProfit, 0) / totalItems;
  const maxProfit = Math.max(...results.map(r => r.profit));

  document.getElementById('summaryBar').innerHTML = `
    <div class="summary-card">
      <div class="val">${totalItems}</div>
      <div class="lbl">可制造配方数</div>
    </div>
    <div class="summary-card">
      <div class="val" style="color:#ffd700">${best ? best.name : '-'}</div>
      <div class="lbl">⏱ 时效最高配方</div>
    </div>
    <div class="summary-card">
      <div class="val">${fmt(best ? best.hourlyProfit : 0)}</div>
      <div class="lbl">最高时效利润/小时</div>
    </div>
    <div class="summary-card">
      <div class="val">${fmt(maxProfit)}</div>
      <div class="lbl">单次最高利润</div>
    </div>
    <div class="summary-card">
      <div class="val">${fmt(avgHourly)}</div>
      <div class="lbl">平均时效利润/小时</div>
    </div>
  `;
}

// ===================== 配方列表 =====================
function renderRecipes() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const grade = document.getElementById('filterGrade').value;
  const type = document.getElementById('filterType').value;

  let list = WORKSHOP_DATA.craftingRecipes.map(r => ({ ...r, ...calcProfit(r) }));

  // 过滤
  if (search) list = list.filter(r => r.name.toLowerCase().includes(search));
  if (grade) list = list.filter(r => String(r.grade) === grade);
  if (type === 's9') list = list.filter(r => r.isS9);
  if (type === 'old') list = list.filter(r => !r.isS9);

  // 排序
  if (currentSort === 'hourly') list.sort((a, b) => b.hourlyProfit - a.hourlyProfit);
  else if (currentSort === 'total') list.sort((a, b) => b.profit - a.profit);
  else if (currentSort === 'grade') list.sort((a, b) => b.grade - a.grade);
  else if (currentSort === 'name') list.sort((a, b) => a.name.localeCompare(b.name));

  // 最大利润用于进度条
  const maxHourly = Math.max(...list.map(r => r.hourlyProfit));

  document.getElementById('recipeCount').textContent = `📦 共找到 ${list.length} 个配方`;

  document.getElementById('recipeGrid').innerHTML = list.length === 0
    ? '<div style="color:#666; padding:40px; text-align:center;">没有找到匹配的配方</div>'
    : list.map((r, i) => renderCard(r, i, maxHourly)).join('');
}

function renderCard(r, rank, maxHourly) {
  const rankClass = rank === 0 ? 'rank-1' : rank === 1 ? 'rank-2' : rank === 2 ? 'rank-3' : '';
  const s9Class = r.isS9 ? 's9' : '';
  const badgeHtml = rank < 3 ? `<div class="rank-badge">${rank + 1}</div>` : '';

  const grades = ['', '⬜', '🟩', '🟦', '🟪', '🟨'];
  const barPct = Math.min(100, (r.hourlyProfit / maxHourly) * 100).toFixed(1);

  const matsHtml = r.materials.map(m => `
    <div class="mat-item">
      <span class="${m.tradable ? 'mat-tradable' : 'mat-bound'}">${m.item} ×${m.qty}</span>
      <span>${m.tradable ? fmt((materialPrices[m.item] || 0) * m.qty) + ' ₵' : '绑定（0）'}</span>
    </div>
  `).join('');

  const roiColor = typeof r.roi === 'number' || (typeof r.roi === 'string' && !r.roi.includes('N/A'))
    ? 'green' : 'na';
  const profitColor = r.profit > 0 ? 'green' : 'orange';

  return `
    <div class="recipe-card ${rankClass} ${s9Class}">
      ${badgeHtml}
      <div class="recipe-name">
        ${grades[r.grade] || ''} ${r.name}
        ${r.isS9 ? '<span class="s9-tag">S9新增</span>' : ''}
      </div>
      <div class="recipe-meta">
        <span>制造${r.craftTime}分钟</span>
        <span>售价${fmt(r.sellPrice)}</span>
        ${r.hasTradable ? `<span>材料${fmt(r.materialCost)}</span>` : '<span>绑定材料·零成本</span>'}
      </div>

      <div class="profit-bar-wrap">
        <div class="profit-bar-bg">
          <div class="profit-bar-fill" style="width:${barPct}%"></div>
        </div>
      </div>

      <div class="profit-row">
        <span class="label">单次净利润</span>
        <span class="value ${profitColor}">${fmt(r.profit)} ₵</span>
      </div>
      <div class="profit-row">
        <span class="label">⏱ 时效利润/小时</span>
        <span class="value gold">${fmt(r.hourlyProfit)} ₵</span>
      </div>
      <div class="profit-row">
        <span class="label">ROI（投资回报率）</span>
        <span class="value ${roiColor}">${typeof r.roi === 'string' ? r.roi : r.roi + '%'}</span>
      </div>

      <div class="materials-toggle" onclick="toggleMats(this)">▶ 查看材料清单</div>
      <div class="materials-list">${matsHtml}</div>
      <div style="margin-top:12px; font-size:0.82em; color:#888;">💡 ${r.recommendation}</div>
    </div>
  `;
}

function toggleMats(el) {
  const list = el.nextElementSibling;
  const open = list.classList.toggle('open');
  el.textContent = (open ? '▼' : '▶') + ' 查看材料清单';
}

function fmt(n) {
  if (typeof n !== 'number') return n;
  return n >= 10000
    ? (n / 10000).toFixed(1) + '万'
    : n.toLocaleString();
}

// 启动
init();
</script>
</body>
</html>
