<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>子弹经济学 - 三角洲行动弹药百科 + 价格计算器 | 三角眼</title>
    <meta name="description" content="三角洲行动弹药百科：口径对比、穿深分析、弹药推荐，以及装备价格计算器。">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1e293b;
            --border: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 1rem;
        }

        .economics-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Hero */
        .hero-section {
            text-align: center;
            padding: 3rem 2rem;
            background: linear-gradient(135deg, rgba(245,158,11,0.1) 0%, rgba(239,68,68,0.1) 100%);
            border-radius: 24px;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }
        .hero-section h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-section p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* Tabs */
        .tool-tabs {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .tab-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 16px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            font-weight: 600;
        }
        .tab-btn:hover { border-color: #f59e0b; transform: translateY(-2px); }
        .tab-btn.active {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            border-color: transparent;
            color: white;
        }

        /* Sections */
        .tool-section {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 24px;
            padding: 2rem;
            display: none;
        }
        .tool-section.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tool-section h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        .tool-section .subtitle {
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }

        /* Caliber Table */
        .caliber-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .caliber-table th {
            background: var(--bg-secondary);
            padding: 1rem;
            text-align: left;
            color: var(--text-primary);
            font-weight: 600;
            border-bottom: 2px solid var(--border);
        }
        .caliber-table td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .caliber-table tr:hover td { background: var(--bg-secondary); }

        .caliber-badge {
            display: inline-block;
            padding: 0.35rem 0.8rem;
            background: rgba(245,158,11,0.15);
            border: 1px solid rgba(245,158,11,0.3);
            border-radius: 8px;
            color: #f59e0b;
            font-weight: 700;
            font-size: 0.9rem;
        }
        .category-badge {
            display: inline-block;
            padding: 0.3rem 0.7rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .cat-nato { background: rgba(59,130,246,0.2); color: #3b82f6; border: 1px solid rgba(59,130,246,0.3); }
        .cat-soviet { background: rgba(239,68,68,0.2); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
        .cat-hk { background: rgba(139,92,246,0.2); color: #8b5cf6; border: 1px solid rgba(139,92,246,0.3); }
        .cat-fn { background: rgba(16,185,129,0.2); color: #10b981; border: 1px solid rgba(16,185,129,0.3); }
        .cat-china { background: rgba(245,158,11,0.2); color: #f59e0b; border: 1px solid rgba(245,158,11,0.3); }
        .cat-shotgun { background: rgba(239,68,68,0.2); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }

        .pen-low { color: #4ade80; }
        .pen-medium { color: #facc15; }
        .pen-high { color: #f97316; }
        .pen-extreme { color: #ef4444; font-weight: 700; }

        /* Ammo Types */
        .ammo-types-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .ammo-type-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s;
        }
        .ammo-type-card:hover { border-color: #f59e0b; transform: translateY(-2px); }
        .ammo-type-card h3 { color: #f59e0b; margin-bottom: 1rem; font-size: 1.1rem; }
        .ammo-type-row {
            display: flex;
            justify-content: space-between;
            padding: 0.6rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }
        .ammo-type-row:last-child { border-bottom: none; }
        .ammo-name { color: var(--text-primary); font-weight: 600; }
        .ammo-damage { color: #ef4444; }
        .ammo-pen { color: #3b82f6; }
        .ammo-note { color: var(--text-secondary); font-size: 0.85rem; }

        /* Tips */
        .tips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .tip-card {
            background: rgba(245,158,11,0.08);
            border-left: 3px solid #f59e0b;
            border-radius: 0 12px 12px 0;
            padding: 1rem 1.2rem;
        }
        .tip-card h4 { color: #f59e0b; margin-bottom: 0.5rem; font-size: 1rem; }
        .tip-card p { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.5; }

        /* Calculator */
        .calculator-card {
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border-radius: 20px;
            padding: 2rem;
        }
        .input-group { margin-bottom: 1.5rem; }
        .input-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .input-group select,
        .input-group input {
            width: 100%;
            padding: 0.9rem;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
        }
        .input-group select:focus,
        .input-group input:focus {
            outline: none;
            border-color: #f59e0b;
        }
        .calculate-btn {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .calculate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(245,158,11,0.3); }

        .result-display {
            margin-top: 2rem;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            display: none;
        }
        .result-display.active { display: block; animation: slideUp 0.3s ease; }
        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 0.7rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }
        .result-row:last-child { border-bottom: none; }
        .result-label { color: var(--text-secondary); }
        .result-value { color: #f59e0b; font-weight: 700; }
        .result-profit { color: #10b981; font-weight: 700; }
        .result-loss { color: #ef4444; font-weight: 700; }

        /* Price Table */
        .price-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        .price-table th {
            background: var(--bg-secondary);
            padding: 0.9rem;
            text-align: left;
            color: var(--text-primary);
            font-weight: 600;
            border-bottom: 2px solid var(--border);
            font-size: 0.9rem;
        }
        .price-table td {
            padding: 0.9rem;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .price-table tr:hover td { background: var(--bg-secondary); }
        .item-name { color: var(--text-primary); font-weight: 500; }
        .price-cell { color: #f59e0b; font-weight: 700; }

        .section-desc {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .hero-section h1 { font-size: 1.8rem; }
            .tool-tabs { gap: 0.5rem; }
            .tab-btn { padding: 0.8rem 1.2rem; font-size: 0.9rem; }
            .economics-container { padding: 1rem; }
        }
    </style>
</head>
<body>
    <div class="economics-container">
        <div class="hero-section">
            <h1>📈 子弹经济学</h1>
            <p>弹药百科 · 口径对比 · 穿深分析 · 装备价格计算器</p>
        </div>

        <div class="tool-tabs">
            <button class="tab-btn active" data-tab="ammo-guide">🔫 弹药百科</button>
            <button class="tab-btn" data-tab="calculator">💰 价格计算器</button>
            <button class="tab-btn" data-tab="price-table">📊 装备价格表</button>
        </div>

        <!-- 弹药百科 -->
        <div id="ammo-guide" class="tool-section active">
            <h2>🔫 弹药百科 — 全口径对比</h2>
            <p class="subtitle">包含12种常用口径的伤害、穿透力、适用武器对比，助你选出最合适的弹药</p>
            <div id="caliberTableWrap"></div>
            <div id="ammoTypesWrap" style="margin-top:2rem;"></div>
            <div id="recommendationsWrap" style="margin-top:2rem;"></div>
        </div>

        <!-- 价格计算器 -->
        <div id="calculator" class="tool-section">
            <h2>💰 装备价格计算器</h2>
            <p class="subtitle">选择装备，输入买入/卖出价格，计算利润</p>
            <div class="calculator-card">
                <div class="input-group">
                    <label>📦 选择装备</label>
                    <select id="itemSelect"></select>
                </div>
                <div class="input-group">
                    <label>💵 买入单价（万哈夫币）</label>
                    <input type="number" id="buyPrice" placeholder="例如：1.5" step="0.01">
                </div>
                <div class="input-group">
                    <label>💵 卖出单价（万哈夫币）</label>
                    <input type="number" id="sellPrice" placeholder="例如：2.0" step="0.01">
                </div>
                <div class="input-group">
                    <label>🔢 交易数量</label>
                    <input type="number" id="quantity" placeholder="例如：10" value="1">
                </div>
                <button class="calculate-btn" onclick="calcProfit()">📊 计算利润</button>
                <div id="calcResult" class="result-display"></div>
            </div>
        </div>

        <!-- 装备价格表 -->
        <div id="price-table" class="tool-section">
            <h2>📊 实时装备价格表</h2>
            <p class="subtitle">来自交易行的实时价格数据，每10分钟更新</p>
            <div id="gearPriceTableWrap"></div>
        </div>
    </div>

    <script>
        let ammoData = null;
        let priceData = null;

        window.addEventListener('DOMContentLoaded', async () => {
            await loadAmmoData();
            await loadPriceData();
            initTabs();
            renderCaliberTable();
            renderAmmoTypes();
            renderRecommendations();
            populateItemSelect();
            renderGearPriceTable();
        });

        // ========== 数据加载 ==========
        async function loadAmmoData() {
            try {
                const resp = await fetch('data/ammunition.json');
                ammoData = await resp.json();
            } catch(e) {
                console.warn('ammunition.json 加载失败，使用内嵌数据');
                ammoData = getFallbackAmmoData();
            }
        }

        async function loadPriceData() {
            try {
                const resp = await fetch('/price.json');
                priceData = await resp.json();
            } catch(e) {
                console.warn('price.json 加载失败');
                priceData = [];
            }
        }

        // ========== Tab 切换 ==========
        function initTabs() {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tool-section').forEach(s => s.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(btn.dataset.tab).classList.add('active');
                });
            });
        }

        // ========== 口径对比表 ==========
        function renderCaliberTable() {
            const calibers = ammoData?.calibers || [];
            let html = `<table class="caliber-table">
                <thead><tr>
                    <th>口径</th><th>阵营</th><th>典型伤害</th><th>穿透力</th><th>适用武器</th><th>描述</th>
                </tr></thead><tbody>`;
            calibers.forEach(c => {
                const catClass = {
                    'NATO': 'cat-nato', 'Soviet': 'cat-soviet', 'HK': 'cat-hk',
                    'FN': 'cat-fn', 'China': 'cat-china', 'Shotgun': 'cat-shotgun'
                }[c.category] || '';
                const penClass = c.penetration.includes('极高') ? 'pen-extreme' :
                               c.penetration.includes('高') ? 'pen-high' :
                               c.penetration.includes('中') ? 'pen-medium' : 'pen-low';
                html += `<tr>
                    <td><span class="caliber-badge">${c.caliber}</span></td>
                    <td><span class="category-badge ${catClass}">${c.category}</span></td>
                    <td>${c.typicalDamage}</td>
                    <td class="${penClass}">${c.penetration}</td>
                    <td>${(c.weapons||[]).join('、')}</td>
                    <td>${c.description}</td>
                </tr>`;
            });
            html += '</tbody></table>';
            document.getElementById('caliberTableWrap').innerHTML = html;
        }

        // ========== 弹药类型对比 ==========
        function renderAmmoTypes() {
            const ammoTypes = ammoData?.ammoTypes?.examples || [];
            if (!ammoTypes.length) return;
            let html = '<h3 style="color:#f59e0b;margin-bottom:1rem;">🔬 同口径不同弹药类型对比</h3>';
            html += '<div class="ammo-types-grid">';
            ammoTypes.forEach(group => {
                let rows = (group.types||[]).map(t =>
                    `<div class="ammo-type-row">
                        <span class="ammo-name">${t.name}</span>
                        <span class="ammo-damage">伤害${t.damage}</span>
                        <span class="ammo-pen">穿深${t.penetration}</span>
                        <span class="ammo-note">${t.note||''}</span>
                    </div>`
                ).join('');
                html += `<div class="ammo-type-card">
                    <h3>${group.caliber}</h3>
                    ${rows}
                </div>`;
            });
            html += '</div>';
            document.getElementById('ammoTypesWrap').innerHTML = html;
        }

        // ========== 推荐建议 ==========
        function renderRecommendations() {
            const tips = ammoData?.recommendations?.general || [];
            if (!tips.length) return;
            const defaultTips = [
                {title:'🎯 PVE模式', content:'优先选择高穿透弹药对抗AI护甲，AI护甲等级固定，高穿深弹药用起来更轻松。'},
                {title:'⚔️ PVP模式', content:'平衡伤害和穿透，根据对手护甲选择。T4护甲用穿透40+的弹药，T5以上需要穿透50+。'},
                {title:'🏹 狙击步枪', content:'优先选择高穿透弹药保证远程击杀，伤害略低也没关系，一枪入魂。'},
                {title:'💨 冲锋枪', content:'近战优先高伤害弹药，穿透次要。霰弹枪独头弹近战一发入魂。'}
            ];
            let html = '<h3 style="color:#f59e0b;margin-bottom:1rem;">💡 弹药选择建议</h3>';
            html += '<div class="tips-grid">';
            defaultTips.forEach(t => {
                html += `<div class="tip-card"><h4>${t.title}</h4><p>${t.content}</p></div>`;
            });
            tips.forEach(t => {
                html += `<div class="tip-card"><h4>📌 提示</h4><p>${t}</p></div>`;
            });
            html += '</div>';
            document.getElementById('recommendationsWrap').innerHTML = html;
        }

        // ========== 价格计算器 ==========
        function populateItemSelect() {
            const select = document.getElementById('itemSelect');
            if (!priceData || !priceData.length) {
                select.innerHTML = '<option>价格数据加载中...</option>';
                return;
            }
            // 只显示有价格的装备类物品（过滤掉子弹/消耗品）
            const gearCategories = ['头盔', '护甲', '胸挂', '背包', '步枪', '冲锋枪', '狙击枪', '霰弹枪', '轻机枪', '手枪'];
            const items = priceData.filter(i => gearCategories.includes(i.secondClassCN)).slice(0, 200);
            select.innerHTML = items.map(i =>
                `<option value="${i.id}" data-price="${i.price}">${i.name} — ¥${i.price.toLocaleString()}</option>`
            ).join('');
        }

        function calcProfit() {
            const select = document.getElementById('itemSelect');
            const opt = select.options[select.selectedIndex];
            const buy = parseFloat(document.getElementById('buyPrice').value) || 0;
            const sell = parseFloat(document.getElementById('sellPrice').value) || 0;
            const qty = parseInt(document.getElementById('quantity').value) || 1;

            if (!buy || !sell) {
                alert('请输入买入和卖出价格');
                return;
            }

            const cost = buy * qty;
            const revenue = sell * qty;
            const profit = revenue - cost;
            const margin = buy > 0 ? ((profit / cost) * 100).toFixed(1) : 0;

            const resultEl = document.getElementById('calcResult');
            resultEl.innerHTML = `
                <div class="result-row">
                    <span class="result-label">📦 物品</span>
                    <span class="result-value">${opt.text.split(' — ')[0]}</span>
                </div>
                <div class="result-row">
                    <span class="result-label">💰 总成本</span>
                    <span class="result-value">${cost.toFixed(2)} 万</span>
                </div>
                <div class="result-row">
                    <span class="result-label">💰 总收入</span>
                    <span class="result-value">${revenue.toFixed(2)} 万</span>
                </div>
                <div class="result-row">
                    <span class="result-label">📊 利润</span>
                    <span class="${profit >= 0 ? 'result-profit' : 'result-loss'}">${profit >= 0 ? '+' : ''}${profit.toFixed(2)} 万（${margin}%）</span>
                </div>
            `;
            resultEl.classList.add('active');
        }

        // ========== 装备价格表 ==========
        function renderGearPriceTable() {
            const wrap = document.getElementById('gearPriceTableWrap');
            if (!priceData || !priceData.length) {
                wrap.innerHTML = '<p style="color:var(--text-secondary);padding:2rem;text-align:center;">价格数据加载中，请稍候...</p>';
                return;
            }
            // 按分类分组显示
            const gearCategories = ['头盔', '护甲', '胸挂', '背包', '步枪', '冲锋枪', '精确射手步枪', '狙击枪', '霰弹枪', '轻机枪', '手枪'];
            let html = '';
            gearCategories.forEach(cat => {
                const items = priceData.filter(i => i.secondClassCN === cat).sort((a,b) => a.price - b.price).slice(0, 20);
                if (!items.length) return;
                html += `<h3 style="color:#f59e0b;margin:1.5rem 0 0.8rem;">${cat}（最低价前20）</h3>`;
                html += `<table class="price-table"><thead><tr><th>物品名</th><th>价格</th><th>更新时间</th></tr></thead><tbody>`;
                items.forEach(item => {
                    const ts = new Date(item.is_get_time * 1000).toLocaleString('zh-CN');
                    html += `<tr>
                        <td class="item-name">${item.name}</td>
                        <td class="price-cell">¥${item.price.toLocaleString()}</td>
                        <td style="color:var(--text-secondary);font-size:0.85rem;">${ts}</td>
                    </tr>`;
                });
                html += '</tbody></table>';
            });
            wrap.innerHTML = html || '<p style="color:var(--text-secondary);">暂无价格数据</p>';
        }

        // ========== 兜底数据 ==========
        function getFallbackAmmoData() {
            return {
                "ammoSystem": {"totalCalibers": 12, "description": "弹药系统决定武器的伤害类型和穿透力"},
