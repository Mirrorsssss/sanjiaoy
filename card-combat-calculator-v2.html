<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡战备推荐 - 三角眼</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        header p {
            color: #888;
            font-size: 14px;
        }
        
        /* 地图选择区 */
        .section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .section-title {
            font-size: 16px;
            color: #00d9ff;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .map-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }
        
        .map-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .map-card:hover {
            border-color: rgba(0,217,255,0.5);
            transform: translateY(-2px);
        }
        
        .map-card.selected {
            border-color: #00d9ff;
            background: rgba(0,217,255,0.15);
            box-shadow: 0 0 20px rgba(0,217,255,0.3);
        }
        
        .map-card .name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .map-card .threshold {
            font-size: 12px;
            color: #888;
        }
        
        .map-card .threshold span {
            color: #00ff88;
            font-weight: 600;
        }
        
        /* 模式选择 */
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .mode-btn {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .mode-btn:hover {
            border-color: rgba(0,217,255,0.5);
        }
        
        .mode-btn.selected {
            border-color: #00d9ff;
            background: rgba(0,217,255,0.15);
        }
        
        .mode-btn .name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .mode-btn .desc {
            font-size: 12px;
            color: #888;
        }
        
        /* 推荐结果 */
        .result {
            display: none;
            animation: fadeIn 0.5s;
        }
        
        .result.show {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .summary-card {
            background: linear-gradient(135deg, rgba(0,255,136,0.2), rgba(0,217,255,0.2));
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(0,255,136,0.3);
            text-align: center;
        }
        
        .summary-card .threshold-display {
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
        }
        
        .summary-card .threshold-value {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(90deg, #00ff88, #00d9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .summary-card .threshold-unit {
            font-size: 16px;
            color: #888;
            margin-left: 4px;
        }
        
        .summary-card .cost-info {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .summary-card .cost-label {
            font-size: 14px;
            color: #888;
        }
        
        .summary-card .cost-value {
            font-size: 32px;
            font-weight: 700;
            color: #ffcc00;
        }
        
        /* 装备列表 */
        .gear-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .gear-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        
        .gear-item:hover {
            border-color: rgba(0,217,255,0.5);
            background: rgba(0,217,255,0.05);
        }
        
        .gear-icon {
            width: 48px;
            height: 48px;
            background: rgba(0,217,255,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }
        
        .gear-info {
            flex: 1;
        }
        
        .gear-info .category {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }
        
        .gear-info .name {
            font-size: 16px;
            font-weight: 600;
        }
        
        .gear-info .combat-value {
            font-size: 13px;
            color: #00ff88;
            margin-top: 4px;
        }
        
        .gear-price {
            text-align: right;
            flex-shrink: 0;
        }
        
        .gear-price .price {
            font-size: 18px;
            font-weight: 700;
            color: #ffcc00;
        }
        
        .gear-price .combat-value-badge {
            font-size: 12px;
            color: #00ff88;
            margin-top: 4px;
        }
        
        /* 武器推荐 */
        .weapon-section {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            margin-top: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .weapon-section .title {
            font-size: 14px;
            color: #888;
            margin-bottom: 12px;
        }
        
        .weapon-combo {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .weapon-chip {
            background: rgba(255,217,0,0.15);
            border: 1px solid rgba(255,217,0,0.3);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
        }
        
        .weapon-chip .weapon-name {
            color: #fff;
            font-weight: 600;
        }
        
        .weapon-chip .weapon-cost {
            color: #ffcc00;
            margin-left: 8px;
        }
        
        /* 提示 */
        .tips {
            background: rgba(255,204,0,0.1);
            border: 1px solid rgba(255,204,0,0.3);
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
        }
        
        .tips .title {
            font-size: 14px;
            color: #ffcc00;
            margin-bottom: 8px;
        }
        
        .tips ul {
            list-style: none;
            font-size: 13px;
            color: #ccc;
        }
        
        .tips li {
            padding: 4px 0;
            padding-left: 16px;
            position: relative;
        }
        
        .tips li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: #ffcc00;
        }
        
        /* 计算按钮 */
        .calc-btn {
            width: 100%;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .calc-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(0,217,255,0.4);
        }
        
        .calc-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 卡战备计算器</h1>
            <p>选择地图和模式，自动推荐最优配置方案</p>
        </header>
        
        <!-- 地图选择 -->
        <div class="section">
            <div class="section-title">📍 选择地图</div>
            <div class="map-grid" id="mapGrid">
                <div class="map-card" data-map="zeroDam" data-name="零号大坝">
                    <div class="name">零号大坝</div>
                    <div class="threshold">机密: <span>13万</span></div>
                </div>
                <div class="map-card" data-map="longbowValley" data-name="长弓溪谷">
                    <div class="name">长弓溪谷</div>
                    <div class="threshold">机密: <span>13万</span></div>
                </div>
                <div class="map-card" data-map="spacePort" data-name="航天基地">
                    <div class="name">航天基地</div>
                    <div class="threshold">机密: <span>18.7万</span><br>绝密: <span>45万</span></div>
                </div>
                <div class="map-card" data-map="buckish" data-name="巴克什">
                    <div class="name">巴克什</div>
                    <div class="threshold">机密: <span>18.7万</span><br>绝密: <span>55万</span></div>
                </div>
                <div class="map-card" data-map="tidalPrison" data-name="潮汐监狱">
                    <div class="name">潮汐监狱</div>
                    <div class="threshold">绝密: <span>69万</span></div>
                </div>
            </div>
        </div>
        
        <!-- 模式选择 -->
        <div class="section" id="modeSection" style="display: none;">
            <div class="section-title">🔐 选择模式</div>
            <div class="mode-grid" id="modeGrid">
                <!-- 动态生成 -->
            </div>
        </div>
        
        <!-- 计算按钮 -->
        <button class="calc-btn" id="calcBtn" disabled>
            选择地图和模式后开始计算
        </button>
        
        <!-- 推荐结果 -->
        <div class="result" id="result">
            <div class="summary-card">
                <div class="threshold-display">战备值门槛</div>
                <div class="threshold-value"><span id="thresholdValue">0</span><span class="threshold-unit">万</span></div>
                <div class="cost-info">
                    <div class="cost-label">预估总花费</div>
                    <div class="cost-value"><span id="totalCost">0</span> 万</div>
                </div>
            </div>
            
            <div class="section">
                <div class="section-title">🛡️ 推荐装备</div>
                <div class="gear-list" id="gearList">
                    <!-- 动态生成 -->
                </div>
                
                <div class="weapon-section">
                    <div class="title">🔫 推荐武器搭配</div>
                    <div class="weapon-combo" id="weaponCombo">
                        <!-- 动态生成 -->
                    </div>
                </div>
            </div>
            
            <div class="tips">
                <div class="title">💡 优化建议</div>
                <ul id="tipsList">
                    <!-- 动态生成 -->
                </ul>
            </div>
        </div>
    </div>
    
    <script>
        // 地图配置
        const mapConfig = {
            zeroDam: {
                name: '零号大坝',
                modes: {
                    classified: { threshold: 13, target: 13 }
                }
            },
            longbowValley: {
                name: '长弓溪谷',
                modes: {
                    classified: { threshold: 13, target: 13 }
                }
            },
            spacePort: {
                name: '航天基地',
                modes: {
                    classified: { threshold: 18.7, target: 18.7 },
                    topSecret: { threshold: 45, target: 45 }
                }
            },
            buckish: {
                name: '巴克什',
                modes: {
                    classified: { threshold: 18.7, target: 18.7 },
                    topSecret: { threshold: 55, target: 55 }
                }
            },
            tidalPrison: {
                name: '潮汐监狱',
                modes: {
                    topSecret: { threshold: 69, target: 78 }
                }
            }
        };
        
        // 装备数据库（战备值/价格比最高的装备）
        const gearDatabase = {
            helmets: [
                { name: '户外棒球帽', category: '头盔', combatValue: 0.5, price: 0.5, note: '最低配' },
                { name: '老式钢盔 (几乎全新)', category: '头盔', combatValue: 1.3, price: 0.13, note: '便宜' },
                { name: 'DRO 战术头盔', category: '头盔', combatValue: 8.4, price: 0.84, note: '性价比高' },
                { name: 'H09 防暴头盔 (几乎全新)', category: '头盔', combatValue: 9.3, price: 0.93, note: '高性价比' },
                { name: 'GN 久战重型夜视头盔', category: '头盔', combatValue: 224.8, price: 22.48, note: '绝密级' },
                { name: '破损的DICH训练头盔', category: '头盔', combatValue: 45, price: 4.5, note: '绝密推荐' },
            ],
            armors: [
                { name: '安保防弹衣', category: '护甲', combatValue: 2.4, price: 0.24, note: '最低配' },
                { name: '尼龙防弹衣 (几乎全新)', category: '护甲', combatValue: 2.6, price: 0.26, note: '便宜' },
                { name: '武士防弹背心 (破损)', category: '护甲', combatValue: 76.3, price: 7.6, note: '高性价比' },
                { name: '射手战术背心 (破损)', category: '护甲', combatValue: 36.2, price: 3.6, note: '高性价比' },
                { name: 'DT-AVS防弹衣', category: '护甲', combatValue: 199.9, price: 19.99, note: '绝密级' },
                { name: '精英防弹背心 (破损)', category: '护甲', combatValue: 260.7, price: 26, note: '绝密推荐' },
            ],
            backpacks: [
                { name: '帆布背囊', category: '背包', combatValue: 1.2, price: 0.12, note: '最低配' },
                { name: '战术快拆背包', category: '背包', combatValue: 4.5, price: 0.45, note: '基础款' },
                { name: 'MAP侦察背包', category: '背包', combatValue: 41.9, price: 4.2, note: '高性价比' },
                { name: '雨林猎手背包', category: '背包', combatValue: 35, price: 3.5, note: '推荐' },
            ],
            chestRigs: [
                { name: 'G01战术弹挂', category: '胸挂', combatValue: 3.5, price: 0.35, note: '基础款' },
                { name: 'GIR野战胸挂', category: '胸挂', combatValue: 25, price: 2.5, note: '高性价比' },
                { name: 'DRC先进侦察胸挂', category: '胸挂', combatValue: 65, price: 6.5, note: '绝密级' },
            ]
        };
        
        // 武器数据库
        const weaponDatabase = {
            // 低价位 (0-5万战备)
            budget: [
                { name: 'MP5冲锋枪', price: 1, combatValue: 2, ammo: '9×19mm', note: '裸枪+30发弹匣' },
                { name: 'M870霰弹枪', price: 4, combatValue: 3, ammo: '12 Gauge', note: '清AI效率高' },
                { name: 'CAR-15突击步枪', price: 1, combatValue: 2.5, ammo: '5.56×45mm', note: '平民毕业枪' },
                { name: 'AKM突击步枪', price: 4.5, combatValue: 4, ammo: '7.62×39mm', note: '高伤害' },
            ],
            // 中价位 (5-15万战备)
            mid: [
                { name: 'K416突击步枪', price: 8, combatValue: 7, ammo: '5.56×45mm', note: '全能型' },
                { name: 'P90冲锋枪', price: 6, combatValue: 5, ammo: '5.7×28mm', note: '高射速' },
                { name: 'M249轻机枪', price: 12, combatValue: 10, ammo: '5.56×45mm', note: '火力压制' },
                { name: 'M7战斗步枪', price: 14, combatValue: 12, ammo: '6.8×51mm', note: '绝密级' },
            ],
            // 高价位 (15万+战备)
            high: [
                { name: 'PKM通用机枪', price: 14, combatValue: 14, ammo: '7.62×54mmR', note: '绝密标配' },
                { name: 'AS Val突击步枪', price: 18, combatValue: 15, ammo: '9×39mm', note: '微声神器' },
                { name: 'R93狙击步枪', price: 20, combatValue: 18, ammo: '7.62×51mm', note: '远程狙杀' },
            ]
        };
        
        // 计算最优配置
        function calculateOptimalLoadout(threshold, target) {
            const results = {
                helmet: null,
                armor: null,
                backpack: null,
                chestRig: null,
                weapons: [],
                totalCost: 0,
                totalCombatValue: 0
            };
            
            // 根据阈值选择装备等级
            let gearTier = 'budget';
            if (threshold >= 45) gearTier = 'high';
            else if (threshold >= 18) gearTier = 'mid';
            
            // 选择最优装备
            // 1. 头盔
            if (gearTier === 'high') {
                results.helmet = gearDatabase.helmets.find(h => h.name === '破损的DICH训练头盔');
            } else if (gearTier === 'mid') {
                results.helmet = gearDatabase.helmets.find(h => h.name === 'H09 防暴头盔 (几乎全新)');
            } else {
                results.helmet = gearDatabase.helmets.find(h => h.name === '户外棒球帽');
            }
            
            // 2. 防弹衣
            if (gearTier === 'high') {
                results.armor = gearDatabase.armors.find(a => a.name === '武士防弹背心 (破损)');
            } else if (gearTier === 'mid') {
                results.armor = gearDatabase.armors.find(a => a.name === '射手战术背心 (破损)');
            } else {
                results.armor = gearDatabase.armors.find(a => a.name === '尼龙防弹衣 (几乎全新)');
            }
            
            // 3. 背包
            if (gearTier === 'high') {
                results.backpack = gearDatabase.backpacks.find(b => b.name === '雨林猎手背包');
            } else {
                results.backpack = gearDatabase.backpacks.find(b => b.name === '战术快拆背包');
            }
            
            // 4. 胸挂
            if (gearTier === 'high') {
                results.chestRig = gearDatabase.chestRigs.find(c => c.name === 'GIR野战胸挂');
            } else {
                results.chestRig = gearDatabase.chestRigs.find(c => c.name === 'G01战术弹挂');
            }
            
            // 5. 武器
            let weaponPool = weaponDatabase.budget;
            if (gearTier === 'high') weaponPool = weaponDatabase.high;
            else if (gearTier === 'mid') weaponPool = weaponDatabase.mid;
            
            // 选择战备值最高的武器
            const bestWeapon = weaponPool.reduce((max, w) => w.combatValue > max.combatValue ? w : max);
            results.weapons.push(bestWeapon);
            
            // 计算总计
            results.totalCost = 
                (results.helmet?.price || 0) +
                (results.armor?.price || 0) +
                (results.backpack?.price || 0) +
                (results.chestRig?.price || 0) +
                (results.weapons.reduce((sum, w) => sum + w.price, 0));
            
            results.totalCombatValue =
                (results.helmet?.combatValue || 0) +
                (results.armor?.combatValue || 0) +
                (results.backpack?.combatValue || 0) +
                (results.chestRig?.combatValue || 0) +
                (results.weapons.reduce((sum, w) => sum + w.combatValue, 0));
            
            return results;
        }
        
        // 状态
        let selectedMap = null;
        let selectedMode = null;
        
        // 地图选择
        document.querySelectorAll('.map-card').forEach(card => {
            card.addEventListener('click', () => {
                document.querySelectorAll('.map-card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedMap = card.dataset.map;
                selectedMode = null;
                
                // 显示模式选择
                const modeSection = document.getElementById('modeSection');
                const modeGrid = document.getElementById('modeGrid');
                const config = mapConfig[selectedMap];
                
                modeGrid.innerHTML = '';
                Object.entries(config.modes).forEach(([mode, data]) => {
                    const modeNames = {
                        classified: { name: '机密', desc: `${data.threshold}万战备` },
                        topSecret: { name: '绝密', desc: `${data.threshold}万战备` }
                    };
                    const modeInfo = modeNames[mode];
                    
                    const modeBtn = document.createElement('div');
                    modeBtn.className = 'mode-btn';
                    modeBtn.dataset.mode = mode;
                    modeBtn.innerHTML = `
                        <div class="name">${modeInfo.name}</div>
                        <div class="desc">${modeInfo.desc}</div>
                    `;
                    modeBtn.addEventListener('click', () => selectMode(mode));
                    modeGrid.appendChild(modeBtn);
                });
                
                modeSection.style.display = 'block';
                document.getElementById('calcBtn').disabled = true;
                document.getElementById('result').classList.remove('show');
            });
        });
        
        // 模式选择
        function selectMode(mode) {
            selectedMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('selected', btn.dataset.mode === mode);
            });
            document.getElementById('calcBtn').disabled = false;
            document.getElementById('calcBtn').textContent = '🎯 计算最优配置';
        }
        
        // 计算按钮
        document.getElementById('calcBtn').addEventListener('click', () => {
            if (!selectedMap || !selectedMode) return;
            
            const config = mapConfig[selectedMap].modes[selectedMode];
            const result = calculateOptimalLoadout(config.threshold, config.target);
            
            // 显示阈值
            document.getElementById('thresholdValue').textContent = config.threshold;
            
            // 显示总花费
            document.getElementById('totalCost').textContent = result.totalCost.toFixed(1);
            
            // 显示装备列表
            const gearList = document.getElementById('gearList');
            gearList.innerHTML = '';
            
            const gearItems = [
                { item: result.helmet, icon: '⛑️' },
                { item: result.armor, icon: '🦺' },
                { item: result.backpack, icon: '🎒' },
                { item: result.chestRig, icon: '📦' }
            ].filter(g => g.item);
            
            gearItems.forEach(g => {
                gearList.innerHTML += `
                    <div class="gear-item">
                        <div class="gear-icon">${g.icon}</div>
                        <div class="gear-info">
                            <div class="category">${g.item.category}</div>
                            <div class="name">${g.item.name}</div>
                            <div class="combat-value">战备值: ${g.item.combatValue.toFixed(1)}万</div>
                        </div>
                        <div class="gear-price">
                            <div class="price">${g.item.price.toFixed(2)}万</div>
                            <div class="combat-value-badge">性价比: ${(g.item.combatValue/g.item.price).toFixed(1)}</div>
                        </div>
                    </div>
                `;
            });
            
            // 显示武器
            const weaponCombo = document.getElementById('weaponCombo');
            weaponCombo.innerHTML = result.weapons.map(w => `
                <div class="weapon-chip">
                    <span class="weapon-name">${w.name}</span>
                    <span class="weapon-cost">${w.price}万</span>
                </div>
                <div class="weapon-chip">
                    <span class="weapon-name">${w.ammo}</span>
                    <span class="weapon-cost">战备${w.combatValue}万</span>
                </div>
            `).join('');
            
            // 显示提示
            const tipsList = document.getElementById('tipsList');
            const tips = [
                `战备值刚好达到门槛即可，多一分都是浪费`,
                `建议中午购买装备，价格可能更低`,
                `破损装备耐久低但战备值不缩水，性价比极高`,
                `武器选择根据个人习惯和地图特点调整`
            ];
            tipsList.innerHTML = tips.map(t => `<li>${t}</li>`).join('');
            
            // 显示结果
            document.getElementById('result').classList.add('show');
            
            // 滚动到结果
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
