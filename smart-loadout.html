<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一键配装系统 - 三角眼工具站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: linear-gradient(135deg, rgba(255, 107, 0, 0.15) 0%, rgba(255, 107, 0, 0.05) 100%);
            border: 2px solid #ff6b00;
            border-radius: 15px;
        }

        .header h1 {
            color: #ff6b00;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #888;
            font-size: 1.1em;
        }

        /* 输入区域 */
        .input-section {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .input-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .input-group {
            flex: 1;
            min-width: 200px;
        }

        .input-group label {
            display: block;
            color: #888;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #444;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #ff6b00;
            box-shadow: 0 0 15px rgba(255, 107, 0, 0.2);
        }

        /* 滑块样式 */
        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 8px;
            -webkit-appearance: none;
            background: #333;
            border-radius: 4px;
            outline: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #ff6b00;
            border-radius: 50%;
            cursor: pointer;
        }

        .slider-container input[type="number"] {
            width: 100px;
        }

        /* 模式选择 */
        .mode-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #444;
            border-radius: 10px;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95em;
        }

        .mode-btn:hover {
            border-color: #ff6b00;
            color: #ff6b00;
        }

        .mode-btn.active {
            background: rgba(255, 107, 0, 0.2);
            border-color: #ff6b00;
            color: #ff6b00;
        }

        /* 快捷选项 */
        .quick-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .quick-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #444;
            border-radius: 6px;
            color: #888;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.85em;
        }

        .quick-btn:hover {
            border-color: #ff6b00;
            color: #ff6b00;
        }

        .quick-btn.active {
            background: rgba(255, 107, 0, 0.2);
            border-color: #ff6b00;
            color: #ff6b00;
        }

        /* 生成按钮 */
        .generate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #ff6b00 0%, #ff8533 100%);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .generate-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255, 107, 0, 0.5);
        }

        /* 结果区域 */
        .result-section {
            display: none;
            animation: fadeIn 0.5s;
        }

        .result-section.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 配装档位 */
        .tier-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tier-tab {
            flex: 1;
            min-width: 150px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #444;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .tier-tab:hover {
            border-color: #ff6b00;
        }

        .tier-tab.active {
            background: rgba(255, 107, 0, 0.15);
            border-color: #ff6b00;
        }

        .tier-tab.economical { border-left: 4px solid #4CAF50; }
        .tier-tab.balanced { border-left: 4px solid #FFC107; }
        .tier-tab.luxury { border-left: 4px solid #ff6b00; }

        .tier-name {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .tier-tab.economical .tier-name { color: #4CAF50; }
        .tier-tab.balanced .tier-name { color: #FFC107; }
        .tier-tab.luxury .tier-name { color: #ff6b00; }

        .tier-desc {
            color: #888;
            font-size: 0.85em;
        }

        .tier-price {
            font-size: 1.5em;
            font-weight: bold;
            color: #fff;
            margin-top: 10px;
        }

        .tier-price small {
            font-size: 0.6em;
            color: #888;
        }

        /* 配装卡片 */
        .loadout-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #333;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .loadout-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #333;
        }

        .loadout-title {
            font-size: 1.5em;
            color: #ff6b00;
            font-weight: bold;
        }

        .loadout-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .meta-tag {
            padding: 6px 12px;
            background: rgba(255, 107, 0, 0.2);
            border-radius: 6px;
            font-size: 0.85em;
            color: #ff6b00;
        }

        /* 装备列表 */
        .gear-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .gear-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #444;
            border-radius: 10px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .gear-card:hover {
            border-color: #ff6b00;
            background: rgba(255, 107, 0, 0.1);
            transform: translateY(-2px);
        }

        .gear-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .gear-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, rgba(255, 107, 0, 0.3), rgba(255, 107, 0, 0.1));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .gear-name {
            font-weight: bold;
            color: #fff;
        }

        .gear-slot {
            font-size: 0.8em;
            color: #888;
        }

        .gear-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
        }

        .gear-cv {
            color: #4CAF50;
            font-weight: bold;
        }

        .gear-price {
            color: #FFC107;
        }

        /* 预算对比 */
        .budget-comparison {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .comparison-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }

        .comparison-row:last-child {
            border-bottom: none;
        }

        .comparison-label {
            color: #888;
        }

        .comparison-value {
            font-weight: bold;
            font-size: 1.2em;
        }

        .comparison-value.saving {
            color: #4CAF50;
        }

        .comparison-value.over {
            color: #ff5722;
        }

        .comparison-diff {
            font-size: 0.9em;
            margin-left: 10px;
        }

        /* 弹窗 */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .popup-overlay.show {
            display: flex;
        }

        .popup {
            background: linear-gradient(135deg, #1a1f3a 0%, #0a0e1a 100%);
            border: 2px solid #ff6b00;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            animation: popupIn 0.3s ease;
        }

        @keyframes popupIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .popup-title {
            color: #ff6b00;
            font-size: 1.5em;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .popup-close {
            background: none;
            border: none;
            color: #888;
            font-size: 28px;
            cursor: pointer;
            transition: color 0.3s;
        }

        .popup-close:hover {
            color: #ff6b00;
        }

        .popup-content {
            color: #e0e0e0;
        }

        .popup-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #333;
        }

        .popup-label {
            color: #888;
        }

        .popup-value {
            color: #fff;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #888;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .input-row {
                flex-direction: column;
            }

            .gear-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 一键配装系统</h1>
            <p>输入预算和模式，智能生成最优配装方案</p>
        </div>

        <!-- 输入区域 -->
        <div class="input-section">
            <div class="input-row">
                <div class="input-group">
                    <label>💰 预算（万哈夫币）</label>
                    <div class="slider-container">
                        <input type="range" id="budgetSlider" min="1" max="50" value="15">
                        <input type="number" id="budgetInput" min="1" max="500" value="15" style="width: 80px;">
                    </div>
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label>🎮 游戏模式</label>
                    <div class="mode-selector">
                        <button class="mode-btn active" data-mode="fenghuo">🔥 烽火地带</button>
                        <button class="mode-btn" data-mode="quanmian">🌍 全面战场</button>
                    </div>
                </div>
                <div class="input-group">
                    <label>👥 队伍人数</label>
                    <div class="mode-selector">
                        <button class="mode-btn active" data-team="1">单排</button>
                        <button class="mode-btn" data-team="2">双排</button>
                        <button class="mode-btn" data-team="4">四排</button>
                    </div>
                </div>
            </div>

            <div class="quick-options">
                <span style="color: #888; font-size: 0.9em;">快捷选择：</span>
                <button class="quick-btn" data-budget="5">5万经济</button>
                <button class="quick-btn" data-budget="10">10万基础</button>
                <button class="quick-btn active" data-budget="15">15万标准</button>
                <button class="quick-btn" data-budget="25">25万进阶</button>
                <button class="quick-btn" data-budget="50">50万豪华</button>
                <button class="quick-btn" data-budget="100">100万顶配</button>
            </div>

            <button class="generate-btn" id="generateBtn">🚀 一键生成配装</button>
        </div>

        <!-- 结果区域 -->
        <div class="result-section" id="resultSection">
            <div class="tier-tabs" id="tierTabs"></div>
            <div id="loadoutContent"></div>
        </div>
    </div>

    <!-- 弹窗 -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup">
            <div class="popup-header">
                <div class="popup-title" id="popupTitle">装备详情</div>
                <button class="popup-close" id="popupClose">&times;</button>
            </div>
            <div class="popup-content" id="popupContent"></div>
        </div>
    </div>

    <script>
        // 状态管理
        let currentBudget = 15;
        let currentMode = 'fenghuo';
        let currentTeamSize = 1;
        let loadoutData = null;
        let selectedTier = 'economical';

        // 初始化
        async function init() {
            await loadLoadoutData();
            setupEventListeners();
            updateBudgetDisplay();
        }

        // 加载配装数据
        async function loadLoadoutData() {
            try {
                const response = await fetch('smart-loadout-api.json');
                loadoutData = await response.json();
            } catch (error) {
                console.error('加载配装数据失败:', error);
                loadoutData = getDefaultLoadoutData();
            }
        }

        // 默认配装数据
        function getDefaultLoadoutData() {
            return {
                gear_sets: {
                    economical: {
                        name: '经济型配装',
                        description: '推荐预算内，性价比最高',
                        loadouts: []
                    },
                    balanced: {
                        name: '均衡型配装',
                        description: '略超预算，体验更佳',
                        loadouts: []
                    },
                    luxury: {
                        name: '豪华型配装',
                        description: '预算1.5倍，极致体验',
                        loadouts: []
                    }
                }
            };
        }

        // 设置事件监听
        function setupEventListeners() {
            // 预算滑块
            const slider = document.getElementById('budgetSlider');
            const input = document.getElementById('budgetInput');
            
            slider.addEventListener('input', (e) => {
                currentBudget = parseInt(e.target.value);
                input.value = currentBudget;
                updateBudgetDisplay();
            });

            input.addEventListener('input', (e) => {
                currentBudget = parseInt(e.target.value) || 1;
                slider.value = Math.min(Math.max(currentBudget, 1), 50);
                updateBudgetDisplay();
            });

            // 模式选择
            document.querySelectorAll('.mode-selector').forEach(group => {
                group.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        group.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        
                        if (btn.dataset.mode) {
                            currentMode = btn.dataset.mode;
                        } else if (btn.dataset.team) {
                            currentTeamSize = parseInt(btn.dataset.team);
                        }
                    });
                });
            });

            // 快捷选项
            document.querySelectorAll('.quick-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    currentBudget = parseInt(btn.dataset.budget);
                    slider.value = Math.min(currentBudget, 50);
                    input.value = currentBudget;
                    updateBudgetDisplay();
                });
            });

            // 生成按钮
            document.getElementById('generateBtn').addEventListener('click', generateLoadouts);

            // 弹窗关闭
            document.getElementById('popupClose').addEventListener('click', closePopup);
            document.getElementById('popupOverlay').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) {
                    closePopup();
                }
            });
        }

        // 更新预算显示
        function updateBudgetDisplay() {
            // 可以添加其他实时更新逻辑
        }

        // 生成配装
        function generateLoadouts() {
            const resultSection = document.getElementById('resultSection');
            const tierTabs = document.getElementById('tierTabs');
            const content = document.getElementById('loadoutContent');

            // 显示结果区域
            resultSection.classList.add('show');

            // 渲染档位选择
            tierTabs.innerHTML = `
                <div class="tier-tab economical active" data-tier="economical">
                    <div class="tier-name">💰 经济型</div>
                    <div class="tier-desc">预算内最优选择</div>
                    <div class="tier-price" id="ecoPrice">-</div>
                </div>
                <div class="tier-tab balanced" data-tier="balanced">
                    <div class="tier-name">⚖️ 均衡型</div>
                    <div class="tier-desc">略超但体验更佳</div>
                    <div class="tier-price" id="balPrice">-</div>
                </div>
                <div class="tier-tab luxury" data-tier="luxury">
                    <div class="tier-name">💎 豪华型</div>
                    <div class="tier-desc">预算1.5倍的极致</div>
                    <div class="tier-price" id="luxPrice">-</div>
                </div>
            `;

            // 档位切换
            tierTabs.querySelectorAll('.tier-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    tierTabs.querySelectorAll('.tier-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    selectedTier = tab.dataset.tier;
                    renderLoadout();
                });
            });

            // 查找匹配的配装
            const ecoLoadout = findMatchingLoadout('economical');
            const balLoadout = findMatchingLoadout('balanced');
            const luxLoadout = findMatchingLoadout('luxury');

            // 更新价格显示
            document.getElementById('ecoPrice').innerHTML = ecoLoadout 
                ? `${formatPrice(ecoLoadout.total_price)}<small>万</small>`
                : '-';
            document.getElementById('balPrice').innerHTML = balLoadout 
                ? `${formatPrice(balLoadout.total_price)}<small>万</small>`
                : '-';
            document.getElementById('luxPrice').innerHTML = luxLoadout 
                ? `${formatPrice(luxLoadout.total_price)}<small>万</small>`
                : '-';

            // 渲染默认选中的配装
            renderLoadout();
        }

        // 查找匹配的配装
        function findMatchingLoadout(tier) {
            const sets = loadoutData?.gear_sets;
            if (!sets || !sets[tier]) return null;

            const loadouts = sets[tier].loadouts;
            
            // 筛选匹配模式和队伍人数
            const matching = loadouts.filter(l => 
                (l.mode === currentMode || l.mode === 'both') &&
                (l.team_size === currentTeamSize || l.team_size === 1)
            );

            if (matching.length === 0) {
                // 返回通用配装
                return loadouts[0] || null;
            }

            // 根据预算选择最合适的
            return matching[0];
        }

        // 渲染配装
        function renderLoadout() {
            const content = document.getElementById('loadoutContent');
            const loadout = findMatchingLoadout(selectedTier);

            if (!loadout) {
                content.innerHTML = '<div class="loading">暂无匹配的配装方案</div>';
                return;
            }

            const tierName = {
                'economical': '💰 经济型配装',
                'balanced': '⚖️ 均衡型配装',
                'luxury': '💎 豪华型配装'
            }[selectedTier];

            // 计算与预算的差异
            const diff = currentBudget * 10000 - loadout.total_price;
            const diffClass = diff >= 0 ? 'saving' : 'over';
            const diffText = diff >= 0 
                ? `节省 ${formatPrice(Math.abs(diff))} 万` 
                : `超支 ${formatPrice(Math.abs(diff))} 万`;

            content.innerHTML = `
                <div class="loadout-card">
                    <div class="loadout-header">
                        <div class="loadout-title">${loadout.name || tierName}</div>
                        <div class="loadout-meta">
                            <span class="meta-tag">🎮 ${currentMode === 'fenghuo' ? '烽火地带' : '全面战场'}</span>
                            <span class="meta-tag">👥 ${currentTeamSize}人队伍</span>
                            <span class="meta-tag">⚔️ ${loadout.cv_value || 0}万战备值</span>
                        </div>
                    </div>

                    <div class="budget-comparison">
                        <div class="comparison-row">
                            <span class="comparison-label">💰 您的预算</span>
                            <span class="comparison-value">${formatPrice(currentBudget)} 万</span>
                        </div>
                        <div class="comparison-row">
                            <span class="comparison-label">📦 配装总价</span>
                            <span class="comparison-value">${formatPrice(loadout.total_price / 10000)} 万</span>
                        </div>
                        <div class="comparison-row">
                            <span class="comparison-label">📊 预算对比</span>
                            <span class="comparison-value ${diffClass}">
                                ${diffText}
                                <span class="comparison-diff">(${diff >= 0 ? '节省' : '超出'} ${Math.abs((diff / (currentBudget * 10000) * 100)).toFixed(0)}%)</span>
                            </span>
                        </div>
                    </div>

                    <div class="gear-grid">
                        ${loadout.items.map((item, index) => `
                            <div class="gear-card" data-index="${index}">
                                <div class="gear-card-header">
                                    <div class="gear-icon">${item.icon}</div>
                                    <div>
                                        <div class="gear-name">${item.name}</div>
                                        <div class="gear-slot">${getSlotName(item.slot)}</div>
                                    </div>
                                </div>
                                <div class="gear-stats">
                                    <span class="gear-cv">⚔️ ${item.cv} 战备</span>
                                    <span class="gear-price">💰 ${formatPrice(item.price / 10000)}万</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    ${loadout.tips && loadout.tips.length > 0 ? `
                        <div style="background: rgba(0,217,255,0.1); border-radius: 10px; padding: 15px; margin-top: 15px;">
                            <div style="color: #00d9ff; font-weight: bold; margin-bottom: 10px;">💡 配装建议</div>
                            ${loadout.tips.map(tip => `<p style="color: #888; font-size: 0.9em; margin: 5px 0;">• ${tip}</p>`).join('')}
                        </div>
                    ` : ''}
                </div>
            `;

            // 添加装备卡片点击事件
            content.querySelectorAll('.gear-card').forEach(card => {
                card.addEventListener('click', () => {
                    const index = parseInt(card.dataset.index);
                    showItemPopup(loadout.items[index]);
                });
            });
        }

        // 获取槽位名称
        function getSlotName(slot) {
            const names = {
                helmet: '头盔',
                armor: '护甲',
                backpack: '背包',
                medical: '医疗',
                weapon: '武器',
                accessory: '配件',
                chestRig: '胸挂'
            };
            return names[slot] || slot;
        }

        // 显示物品弹窗
        function showItemPopup(item) {
            const overlay = document.getElementById('popupOverlay');
            const title = document.getElementById('popupTitle');
            const content = document.getElementById('popupContent');

            title.innerHTML = `${item.icon} ${item.name}`;

            content.innerHTML = `
                <div class="popup-item">
                    <span class="popup-label">槽位</span>
                    <span class="popup-value">${getSlotName(item.slot)}</span>
                </div>
                <div class="popup-item">
                    <span class="popup-label">战备值</span>
                    <span class="popup-value" style="color: #4CAF50;">⚔️ ${item.cv} 万</span>
                </div>
                <div class="popup-item">
                    <span class="popup-label">价格</span>
                    <span class="popup-value" style="color: #FFC107;">💰 ${formatPrice(item.price / 10000)} 万</span>
                </div>
                <div class="popup-item">
                    <span class="popup-label">性价比</span>
                    <span class="popup-value">${(item.cv / (item.price / 10000)).toFixed(2)} 战备/万</span>
                </div>
            `;

            overlay.classList.add('show');
        }

        // 关闭弹窗
        function closePopup() {
            document.getElementById('popupOverlay').classList.remove('show');
        }

        // 格式化价格
        function formatPrice(price) {
            if (typeof price === 'number') {
                return price.toLocaleString('zh-CN', { maximumFractionDigits: 1 });
            }
            return price;
        }

        // 页面加载
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
