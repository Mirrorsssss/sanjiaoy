    <script>
        // жҳҫзӨәж•°жҚ®зҠ¶жҖҒжҸҗзӨә
        function showDataStatus(status, message) {
            const dataStatus = document.getElementById('dataStatus');
            if (!dataStatus) return;
            
            dataStatus.className = 'data-status ' + status;
            
            switch(status) {
                case 'loading':
                    dataStatus.innerHTML = `<span class="icon">вҸі</span><span class="text">${message || 'жӯЈеңЁеҠ иҪҪжёёжҲҸж•°жҚ®...'}</span>`;
                    break;
                case 'loaded':
                    dataStatus.innerHTML = `<span class="icon">вң…</span><span class="text">${message || 'жёёжҲҸж•°жҚ®еҠ иҪҪжҲҗеҠҹ'}</span>`;
                    // 3з§’еҗҺиҮӘеҠЁйҡҗи—Ҹ
                    setTimeout(() => {
                        dataStatus.style.display = 'none';
                    }, 3000);
                    break;
                case 'error':
                    dataStatus.innerHTML = `<span class="icon">вҡ пёҸ</span><span class="text">${message || 'ж•°жҚ®еҠ иҪҪеӨұиҙҘпјҢдҪҝз”Ёй»ҳи®Өж•°жҚ®'}</span>`;
                    break;
            }
        }
        
        // иЈ…еӨҮж•°жҚ®еә“ - еҠЁжҖҒеҠ иҪҪ
        let gearDB = {
            helmets: [],
            armors: [],
            backpacks: [],
            chestRigs: []
        };
        
        let weaponDB = {
            budget: [],
            mid: [],
            high: []
        };
        
        // д»Һgame-data.jsonеҠ иҪҪж•°жҚ®
        async function loadGameData() {
            try {
                showDataStatus('loading', 'жӯЈеңЁеҠ иҪҪжёёжҲҸж•°жҚ®...');
                const resp = await fetch('data/game-data.json?t=' + Date.now());
                const gameData = await resp.json();
                
                // иҪ¬жҚўgearж•°жҚ®дёәgearDBж јејҸ
                if (gameData.gear) {
                    const gearArr = Object.values(gameData.gear);
                    
                    // еӨҙзӣ”
                    gearDB.helmets = gearArr
                        .filter(g => g.type === 'helmet')
                        .map(g => ({
                            name: g.name,
                            type: 'helmet',
                            cv: g.price / 1000,  // жҲҳеӨҮеҖјдј°з®—
                            price: g.price / 10000,  // иҪ¬жҚўдёәдёҮдёәеҚ•дҪҚ
                            icon: 'вӣ‘пёҸ',
                            reason: g.description || `${g.typeCN}пјҢйҳІеҫЎ${g.defense||0}`
                        }))
                        .sort((a, b) => a.cv - b.cv);
                    
                    // жҠӨз”І
                    gearDB.armors = gearArr
                        .filter(g => g.type === 'vest')
                        .map(g => ({
                            name: g.name,
                            type: 'armor',
                            cv: g.price / 1000,
                            price: g.price / 10000,
                            icon: 'рҹҰә',
                            reason: g.description || `${g.typeCN}пјҢйҳІеҫЎ${g.defense||0}`
                        }))
                        .sort((a, b) => a.cv - b.cv);
                    
                    // иғҢеҢ…
                    gearDB.backpacks = gearArr
                        .filter(g => g.type === 'bag')
                        .map(g => ({
                            name: g.name,
                            type: 'backpack',
                            cv: g.price / 1000,
                            price: g.price / 10000,
                            icon: 'рҹҺ’',
                            reason: g.description || `${g.typeCN}пјҢ${g.capacity||0}ж ј`
                        }))
                        .sort((a, b) => a.cv - b.cv);
                    
                    // иғёжҢӮ
                    gearDB.chestRigs = gearArr
                        .filter(g => g.type === 'rig')
                        .map(g => ({
                            name: g.name,
                            type: 'chestRig',
                            cv: g.price / 1000,
                            price: g.price / 10000,
                            icon: 'рҹ“Ұ',
                            reason: g.description || `${g.typeCN}пјҢ${g.capacity||0}ж ј`
                        }))
                        .sort((a, b) => a.cv - b.cv);
                }
                
                // иҪ¬жҚўweaponsж•°жҚ®дёәweaponDBж јејҸ
                if (gameData.weapons) {
                    const weaponsArr = Object.values(gameData.weapons);
                    
                    // з®ҖеҚ•еҲҶзұ»пјҡжҢүpriceеҲҶдёәbudget(<5дёҮ), mid(5-15дёҮ), high(>15дёҮ)

        let currentPlaystyle = 'balanced';
        
        // ең°еӣҫй—Ёж§ӣпјҲдҝқз•ҷз”ЁдәҺе…је®№пјү
        const mapThresholds = {
            'zeroDam_classified': { name: 'йӣ¶еҸ·еӨ§еққ-жңәеҜҶ', threshold: 13 },
            'longbow_classified': { name: 'й•ҝеј“жәӘи°·-жңәеҜҶ', threshold: 13 },
            'spacePort_classified': { name: 'иҲӘеӨ©еҹәең°-жңәеҜҶ', threshold: 18.7 },
            'buckish_classified': { name: 'е·ҙе…Ӣд»Җ-жңәеҜҶ', threshold: 18.7 },
            'spacePort_topSecret': { name: 'иҲӘеӨ©еҹәең°-з»қеҜҶ', threshold: 45 },
            'buckish_topSecret': { name: 'е·ҙе…Ӣд»Җ-з»қеҜҶ', threshold: 55 },
            'tidalPrison_topSecret': { name: 'жҪ®жұҗзӣ‘зӢұ-з»қеҜҶ', threshold: 69 },
        };
        
        // ============================================
        // иҫ…еҠ©еҮҪж•°пјҡиЈ…еӨҮжҖ§д»·жҜ”иҜ„еҲҶ
        // ============================================
        function calculateGearScore(item, type) {
            if (!item || !item.price) return 0;
            let score = 0;
            let priceWan = item.price;
            switch(type) {
                case 'helmet':
                    let defLevel = extractDefenseLevel(item.reason || '');
                    score = (defLevel * 100) / (priceWan + 0.1);
                    break;
                case 'armor':
                    let armorLevel = extractDefenseLevel(item.reason || '');
                    score = (armorLevel * 120) / (priceWan + 0.1);
                    break;
                case 'backpack':
                    let capacity = extractCapacity(item.reason || '');
                    score = capacity / (priceWan + 0.1);
                    break;
                case 'chestRig':
                    let rigCapacity = extractCapacity(item.reason || '');
                    score = rigCapacity / (priceWan + 0.1);
                    break;
            }
            return score;
        }
        
        function extractDefenseLevel(reason) {
            const match = reason.match(/йҳІеҫЎ(\d+)/);
            return match ? parseInt(match[1]) : 3;
        }
        
        function extractCapacity(reason) {
            const match = reason.match(/(\d+)ж ј/);
            return match ? parseInt(match[1]) : 10;
        }
        
        function calculateWeaponScore(weapon) {
            if (!weapon || !weapon.price) return 0;
            let priceWan = weapon.price;
            let fireRate = extractFireRate(weapon.note || '');
            let caliber = weapon.ammo || '';
            let baseScore = fireRate / (priceWan + 0.1);
            let ammoCostMultiplier = getAmmoCostMultiplier(caliber);
            baseScore *= ammoCostMultiplier;
            return baseScore;
        }
        
        function extractFireRate(note) {
            const match = note.match(/е°„йҖҹ(\d+)/);
            return match ? parseInt(match[1]) : 600;
        }
        
        function getAmmoCostMultiplier(caliber) {
            const cheapAmmo = ['9Г—18mm', '9Г—19mm', '.45ACP', '5.7Г—28mm'];
            const mediumAmmo = ['5.56Г—45mm', '7.62Г—39mm', '.308Win'];
            const expensiveAmmo = ['7.62Г—51mm', '7.62Г—54mmR', '.338Lapua'];
            if (cheapAmmo.some(a => caliber.includes(a))) return 1.5;
            if (mediumAmmo.some(a => caliber.includes(a))) return 1.0;
            if (expensiveAmmo.some(a => caliber.includes(a))) return 0.7;
            return 1.0;
        }
        
        function selectBestGear(gearArray, type, budgetLimit, cvLimit, playstyle) {
            if (!gearArray || gearArray.length === 0) return null;
            let candidates = gearArray.filter(g => g.price <= budgetLimit && g.cv <= (cvLimit || 999));
            if (candidates.length === 0) {
                candidates = gearArray.sort((a, b) => a.price - b.price);
                return candidates[0] || null;
            }
            let scored = candidates.map(g => {
                let score = calculateGearScore(g, type);
                if (playstyle === 'aggressive' && (type === 'helmet' || type === 'armor')) score *= 1.5;
                if (playstyle === 'economy') score = (score + 0.5) / (g.price + 0.1);
                if (playstyle === 'stealth') score /= (g.cv + 1);
                return { ...g, score };
            });
            scored.sort((a, b) => b.score - a.score);
            return scored[0] || null;
        }
        
        function selectBestWeapon(weaponArray, budgetLimit, cvLimit, playstyle) {
            if (!weaponArray || weaponArray.length === 0) return null;
            let candidates = weaponArray.filter(w => w.price <= budgetLimit && w.cv <= (cvLimit || 999));
            if (candidates.length === 0) {
                candidates = weaponArray.sort((a, b) => a.price - b.price);
                return candidates[0] || null;
            }
            let scored = candidates.map(w => {
                let score = calculateWeaponScore(w);
                if (playstyle === 'aggressive') {
                    let fireRate = extractFireRate(w.note || '');
                    score *= (fireRate / 600);
                }
                if (playstyle === 'economy') score /= (w.price + 0.1);
                return { ...w, score };
            });
            scored.sort((a, b) => b.score - a.score);
            return scored[0] || null;
        }
        
        function estimateSurvivalProbability(gearCV, weaponCV, threshold) {
            let totalCV = gearCV + weaponCV;
            let ratio = totalCV / threshold;
            if (ratio >= 1.5) return 0.85;
            if (ratio >= 1.2) return 0.65;
            if (ratio >= 1.0) return 0.45;
            if (ratio >= 0.8) return 0.25;
            return 0.10;
        }
        
        function calculateExpectedROI(threshold, totalCost, survivalRate) {
            let expectedLoot = threshold * 1.5;
            let netProfit = (expectedLoot * survivalRate) - totalCost;
            let roi = totalCost > 0 ? (netProfit / totalCost) * 100 : 0;
            return { expectedLoot, netProfit, roi };
        }
        
        // ============================================
        // дјҳеҢ–зүҲпјҡи®Ўз®—жңҖдјҳй…ҚзҪ®
        // ============================================
        function calculateOptimal(budget, targetMap, playstyle = 'balanced') {
            currentPlaystyle = playstyle || 'balanced';
            let allocation = playstyles[currentPlaystyle].allocation;
            
            let threshold, mapName;
            if (targetMap && mapThresholds[targetMap]) {
                threshold = mapThresholds[targetMap].threshold;
                mapName = mapThresholds[targetMap].name;
            } else {
                if (budget >= 69) {
                    threshold = 69; mapName = 'жҪ®жұҗзӣ‘зӢұ-з»қеҜҶ';
                } else if (budget >= 55) {
                    threshold = 55; mapName = 'е·ҙе…Ӣд»Җ-з»қеҜҶ';
                } else if (budget >= 45) {
                    threshold = 45; mapName = 'иҲӘеӨ©еҹәең°-з»қеҜҶ';
                } else if (budget >= 18.7) {
                    threshold = 18.7; mapName = 'иҲӘеӨ©еҹәең°-жңәеҜҶ';
                } else {
                    threshold = 13; mapName = 'йӣ¶еҸ·еӨ§еққ-жңәеҜҶ';
                }
            }
            
            const result = {
                map: mapName,
                threshold: threshold,
                playstyle: playstyles[currentPlaystyle],
                gear: [],
                weapons: [],
                totalCost: 0,
                totalCV: 0,
                survivalRate: 0,
                roi: 0
            };
            
            let remainingBudget = budget;
            let gearTier = budget < 15 ? 'budget' : budget < 40 ? 'mid' : 'high';
            
            // 1. йҖүжӢ©еӨҙзӣ”
            let helmet = selectBestGear(gearDB.helmets, 'helmet', remainingBudget * allocation.helmet * 2, threshold * 0.3, currentPlaystyle);
            if (helmet) {
                result.gear.push({ ...helmet, slot: 'еӨҙзӣ”' });
                remainingBudget -= helmet.price;
            }
            
            // 2. йҖүжӢ©йҳІеј№иЎЈ
            let armor = selectBestGear(gearDB.armors, 'armor', remainingBudget * allocation.armor * 2, threshold * 0.4, currentPlaystyle);
            if (armor) {
                result.gear.push({ ...armor, slot: 'йҳІеј№иЎЈ' });
                remainingBudget -= armor.price;
            }
            
            // 3. йҖүжӢ©иғҢеҢ…
            let backpack = selectBestGear(gearDB.backpacks, 'backpack', remainingBudget * allocation.backpack * 2, threshold * 0.2, currentPlaystyle);
            if (backpack) {
                result.gear.push({ ...backpack, slot: 'иғҢеҢ…' });
                remainingBudget -= backpack.price;
            }
            
            // 4. йҖүжӢ©иғёжҢӮ
            let chestRig = selectBestGear(gearDB.chestRigs, 'chestRig', remainingBudget * allocation.chestRig * 2, threshold * 0.25, currentPlaystyle);
            if (chestRig) {
                result.gear.push({ ...chestRig, slot: 'иғёжҢӮ' });
                remainingBudget -= chestRig.price;
            }
            
            // 5. йҖүжӢ©жӯҰеҷЁ
            let weaponPool = gearTier === 'high' ? weaponDB.high : gearTier === 'mid' ? weaponDB.mid : weaponDB.budget;
            let weapon = selectBestWeapon(weaponPool, remainingBudget * allocation.weapon * 2, threshold, currentPlaystyle);
            if (weapon && weapon.price > remainingBudget * allocation.weapon * 2) {
                let cheaper = weaponPool.filter(w => w.price <= remainingBudget * allocation.weapon * 2).sort((a, b) => b.cv - a.cv);
                if (cheaper.length > 0) weapon = cheaper[0];
            }
            if (weapon) {
                result.weapons.push(weapon);
                remainingBudget -= weapon.price;
            }
            
            // и®Ўз®—жҖ»и®Ў
            result.totalCost = result.gear.reduce((sum, g) => sum + g.price, 0) + result.weapons.reduce((sum, w) => sum + w.price, 0);
            result.totalCV = result.gear.reduce((sum, g) => sum + g.cv, 0) + result.weapons.reduce((sum, w) => sum + w.cv, 0);
            
            // и®Ўз®—з”ҹеӯҳжҰӮзҺҮе’ҢROI
            let gearCV = result.gear.reduce((sum, g) => sum + g.cv, 0);
            let weaponCV = result.weapons.reduce((sum, w) => sum + w.cv, 0);
            result.survivalRate = estimateSurvivalProbability(gearCV, weaponCV, result.threshold);
            let roiData = calculateExpectedROI(result.threshold, result.totalCost, result.survivalRate);
            result.roi = roiData.roi;
            result.expectedLoot = roiData.expectedLoot;
            result.netProfit = roiData.netProfit;
            
            // з”ҹжҲҗжҷәиғҪжҸҗзӨә
            result.tips = generateSmartTips(result, currentPlaystyle);
            
            return result;
        }
        
        // з”ҹжҲҗжҷәиғҪжҸҗзӨә
        function generateSmartTips(result, playstyle) {
            let tips = [];
            if (result.totalCV >= result.threshold * 1.2) {
                tips.push(`вң… жҲҳеӨҮеҖје……и¶іпјҲ${(result.totalCV).toFixed(1)}дёҮ > ${result.threshold}дёҮпјүпјҢз”ҹеӯҳзҺҮй«ҳ`);
            } else if (result.totalCV >= result.threshold) {
                tips.push(`вҡ пёҸ жҲҳеӨҮеҖјеҲҡеҘҪиҫҫж ҮпјҲ${result.totalCV.toFixed(1)}дёҮпјүпјҢе»әи®®и°Ёж…ҺиЎҢдәӢ`);
            } else {
                tips.push(`вқҢ жҲҳеӨҮеҖјдёҚи¶іпјҲ${result.totalCV.toFixed(1)}дёҮ < ${result.threshold}дёҮпјүпјҢж— жі•иҝӣе…Ҙ${result.map}`);
            }
            if (result.totalCost > result.threshold * 1.5) {
                tips.push(`рҹ’° иҠұиҙ№иҫғй«ҳпјҢе»әи®®йҷҚдҪҺиЈ…еӨҮзӯүзә§жҲ–еҮҸе°‘дёҚеҝ…иҰҒзҡ„й…Қд»¶`);
            } else {
                tips.push(`рҹ’° иҠұиҙ№${(result.totalCost / result.threshold * 100).toFixed(0)}%зҡ„й—Ёж§ӣеҖјпјҢжҖ§д»·жҜ”дёҚй”ҷ`);
            }
            let survivalPercent = (result.survivalRate * 100).toFixed(0);
            if (result.survivalRate >= 0.6) {
                tips.push(`рҹҺҜ йў„дј°з”ҹеӯҳзҺҮ${survivalPercent}%пјҢеҸҜд»Ҙз§ҜжһҒдәӨжҲҳ`);
            } else if (result.survivalRate >= 0.3) {
                tips.push(`рҹҺҜ йў„дј°з”ҹеӯҳзҺҮ${survivalPercent}%пјҢе»әи®®йҒҝе…ҚжӯЈйқўеҶІзӘҒ`);
            } else {
                tips.push(`рҹҺҜ йў„дј°з”ҹеӯҳзҺҮ${survivalPercent}%пјҢе»әи®®жҪңиЎҢжҲ–з»„йҳҹ`);
            }
            if (result.roi > 50) {
                tips.push(`рҹ“Ҳ йў„жңҹж”¶зӣҠзҺҮ${result.roi.toFixed(0)}%пјҢеҖјеҫ—дёҖиҜ•пјҒ`);
            } else if (result.roi > 0) {
                tips.push(`рҹ“Ҳ йў„жңҹж”¶зӣҠзҺҮ${result.roi.toFixed(0)}%пјҢеҫ®еҲ©`);
            } else {
                tips.push(`рҹ“Ҳ йў„жңҹж”¶зӣҠзҺҮ${result.roi.toFixed(0)}%пјҢеҸҜиғҪдәҸжҚҹ`);
            }
            
            // ж·»еҠ йҖҡз”ЁжҸҗзӨә
            tips.push(`жҲҳеӨҮеҖјеҲҡеҘҪиҫҫеҲ°${result.threshold}дёҮй—Ёж§ӣеҚіеҸҜпјҢеӨҡдёҖеҲҶйғҪжҳҜжөӘиҙ№`);
            tips.push('е»әи®®дёӯеҚҲ12зӮ№еүҚеҗҺиҙӯд№°иЈ…еӨҮпјҢд»·ж јйҖҡеёёжӣҙдҪҺ');
            tips.push('з ҙжҚҹиЈ…еӨҮиҖҗд№…дҪҺдҪҶжҲҳеӨҮеҖјдёҚзј©ж°ҙпјҢжҖ§д»·жҜ”жһҒй«ҳ');
            tips.push(`еҪ“еүҚйў„з®—${document.getElementById('budget').value || 0}дёҮпјҢе®һйҷ…иҠұиҙ№зәҰ${result.totalCost.toFixed(1)}дёҮ`);
            
            return tips;
        }
        
        // жёІжҹ“з»“жһң
        function renderResult(result) {
            document.getElementById('targetCV').textContent = result.threshold;
            document.getElementById('totalCost').textContent = result.totalCost.toFixed(1);
            
            // жёІжҹ“ж–°еӯ—ж®өпјҡз”ҹеӯҳзҺҮгҖҒROIгҖҒеҮҖж”¶зӣҠ
            if (document.getElementById('survivalRate')) {
                const survivalEl = document.getElementById('survivalRate');
                const survivalPercent = (result.survivalRate * 100).toFixed(0);
                survivalEl.textContent = survivalPercent + '%';
                survivalEl.style.color = result.survivalRate >= 0.6 ? '#00ff88' : result.survivalRate >= 0.3 ? '#ffcc00' : '#ff4444';
            }
            if (document.getElementById('roi')) {
                const roiEl = document.getElementById('roi');
                roiEl.textContent = result.roi.toFixed(0) + '%';
                roiEl.style.color = result.roi > 0 ? '#00ff88' : '#ff4444';
            }
            if (document.getElementById('netProfit')) {
                const profitEl = document.getElementById('netProfit');
                profitEl.textContent = result.netProfit.toFixed(1) + 'дёҮ';
                profitEl.style.color = result.netProfit > 0 ? '#00ff88' : '#ff4444';
            }
            
            // жёІжҹ“иЈ…еӨҮ
            const gearList = document.getElementById('gearList');
            gearList.innerHTML = result.gear.map(g => `
                <div class="gear-item">
                    <div class="gear-icon">${g.icon}</div>
                    <div class="gear-info">
                        <div class="type">${g.type === 'helmet' ? 'еӨҙзӣ”' : g.type === 'armor' ? 'йҳІеј№иЎЈ' : g.type === 'backpack' ? 'иғҢеҢ…' : 'иғёжҢӮ'}</div>
                        <div class="name">${g.name}</div>
                        <div class="reason">${g.reason}</div>
                    </div>
                    <div class="gear-stats">
                        <div class="cv">${g.cv}<small>дёҮ</small></div>
                        <div class="price">${g.price.toFixed(2)}дёҮ</div>
                    </div>
                </div>
            `).join('');
            
            // жёІжҹ“жӯҰеҷЁ
            const weaponList = document.getElementById('weaponList');
            weaponList.innerHTML = result.weapons.map(w => `
                <div class="weapon-chip">
                    <span class="icon">${w.icon}</span>
                    <div>
                        <div class="name">${w.name}</div>
                        <div class="stats">${w.ammo} В· жҲҳеӨҮ${w.cv}дёҮ В· ${w.note}</div>
                    </div>
                </div>
            `).join('');
            
            // жёІжҹ“жҸҗзӨә
            const tipsList = document.getElementById('tipsList');
            tipsList.innerHTML = result.tips.map(t => `<li>${t}</li>`).join('');
            
            document.getElementById('result').classList.add('show');
        }
        
        // дәӢд»¶з»‘е®ҡ
        document.getElementById('calcBtn').addEventListener('click', () => {
            const budget = parseFloat(document.getElementById('budget').value) || 0;
            const map = document.getElementById('map').value;
            
            if (budget <= 0) {
                alert('иҜ·иҫ“е…Ҙжңүж•Ҳйў„з®—');
                return;
            }
            
            const result = calculateOptimal(budget, map, currentPlaystyle);
            renderResult(result);
        });
        
        // еҝ«жҚ·жҢүй’®
        document.querySelectorAll('.quick-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.getElementById('budget').value = btn.dataset.budget;
                document.getElementById('map').value = btn.dataset.map;
                
                document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const result = calculateOptimal(parseFloat(btn.dataset.budget), btn.dataset.map, currentPlaystyle);
                renderResult(result);
            });
        });
        
        // зҺ©жі•йЈҺж јжҢүй’®
        document.querySelectorAll('.playstyle-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.playstyle-btn').forEach(b => {
                    b.classList.remove('active');
                    b.style.background = 'rgba(255,255,255,0.05)';
                    b.style.borderColor = 'rgba(255,255,255,0.2)';
                    b.style.color = '#888';
                });
                btn.classList.add('active');
                btn.style.background = 'rgba(0,217,255,0.2)';
                btn.style.borderColor = '#00d9ff';
                btn.style.color = '#00d9ff';
                
                currentPlaystyle = btn.dataset.playstyle;
                
                // иҮӘеҠЁйҮҚж–°и®Ўз®—
                const budget = parseFloat(document.getElementById('budget').value) || 0;
                const map = document.getElementById('map').value;
                if (budget > 0) {
                    const result = calculateOptimal(budget, map, currentPlaystyle);
                    renderResult(result);
                }
            });
        });
        
        // йЎөйқўеҠ иҪҪж—¶еҲқе§ӢеҢ–
        document.addEventListener('DOMContentLoaded', () => {
            console.log('рҹҡҖ ејҖе§ӢеҠ иҪҪжёёжҲҸж•°жҚ®...');
            loadGameData();
        });
    </script>
</body>
</html>
