<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>子弹推荐 - 三角眼</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔫</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #2d1f3d 50%, #1a1a2e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 40px 20px;
            margin-bottom: 30px;
        }
        
        header h1 {
            font-size: 36px;
            background: linear-gradient(135deg, #ff9500, #ff6b00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        header p {
            color: #888;
            font-size: 16px;
        }
        
        /* 选择区 */
        .selector-section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .selector-group {
            margin-bottom: 20px;
        }
        
        .selector-group label {
            display: block;
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
        }
        
        .weapon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
        }
        
        .weapon-btn {
            padding: 14px 12px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .weapon-btn:hover {
            border-color: rgba(255,149,0,0.5);
            background: rgba(255,149,0,0.1);
        }
        
        .weapon-btn.selected {
            background: rgba(255,149,0,0.2);
            border-color: #ff9500;
            box-shadow: 0 0 20px rgba(255,149,0,0.3);
        }
        
        .weapon-btn .name {
            font-weight: 600;
            font-size: 14px;
        }
        
        .weapon-btn .caliber {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }
        
        /* 场景选择 */
        .scene-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 20px;
        }
        
        .scene-btn {
            padding: 16px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .scene-btn:hover {
            border-color: rgba(255,149,0,0.5);
        }
        
        .scene-btn.selected {
            border-color: #ff9500;
        }
        
        .scene-btn .icon {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .scene-btn .name {
            font-weight: 600;
        }
        
        .scene-btn .desc {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }
        
        /* 结果区 */
        .result {
            display: none;
            animation: fadeIn 0.5s;
        }
        
        .result.show {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 推荐卡片 */
        .recommendation-card {
            background: linear-gradient(135deg, rgba(255,149,0,0.2), rgba(255,107,0,0.2));
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            border: 2px solid rgba(255,149,0,0.4);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .recommendation-card::before {
            content: '⭐ 推荐';
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,149,0,0.3);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .recommendation-card .weapon-name {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .recommendation-card .bullet-name {
            font-size: 36px;
            font-weight: 800;
            color: #ffcc00;
            margin-bottom: 16px;
        }
        
        .recommendation-card .bullet-type {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .recommendation-card .bullet-type.ap {
            background: rgba(255,0,0,0.2);
            color: #ff6b6b;
        }
        
        .recommendation-card .bullet-type.hp {
            background: rgba(0,255,0,0.2);
            color: #69ff94;
        }
        
        .recommendation-card .bullet-type.fm {
            background: rgba(200,200,200,0.2);
            color: #ccc;
        }
        
        .recommendation-card .why {
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            font-size: 14px;
            color: #ccc;
            line-height: 1.6;
        }
        
        /* 价格信息 */
        .price-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .price-item {
            text-align: center;
        }
        
        .price-item .label {
            font-size: 12px;
            color: #888;
        }
        
        .price-item .value {
            font-size: 20px;
            font-weight: 700;
            color: #ffcc00;
        }
        
        /* 其他选择 */
        .alternatives {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .alternatives h3 {
            font-size: 16px;
            color: #888;
            margin-bottom: 12px;
        }
        
        .alt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }
        
        .alt-item {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .alt-item .name {
            font-weight: 600;
            flex: 1;
        }
        
        .alt-item .price {
            color: #ffcc00;
            font-size: 13px;
        }
        
        /* 技巧 */
        .tips {
            background: rgba(0,217,255,0.1);
            border-radius: 16px;
            padding: 20px;
            margin-top: 25px;
            border: 1px solid rgba(0,217,255,0.2);
        }
        
        .tips h3 {
            font-size: 16px;
            color: #00d9ff;
            margin-bottom: 12px;
        }
        
        .tips ul {
            list-style: none;
        }
        
        .tips li {
            padding: 6px 0;
            font-size: 14px;
            color: #aaa;
            padding-left: 20px;
            position: relative;
        }
        
        .tips li::before {
            content: '💡';
            position: absolute;
            left: 0;
        }
        
        @media (max-width: 600px) {
            .scene-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔫 子弹推荐</h1>
            <p>选择武器和场景，直接告诉你用什么子弹最好</p>
        </header>
        
        <div class="selector-section">
            <div class="selector-group">
                <label>选择武器</label>
                <div class="weapon-grid" id="weaponGrid">
                    <!-- 动态生成 -->
                </div>
            </div>
            
            <div class="selector-group">
                <label>使用场景</label>
                <div class="scene-grid">
                    <button class="scene-btn" data-scene="pve">
                        <div class="icon">🤖</div>
                        <div class="name">PVE 打AI</div>
                        <div class="desc">打机器人/任务</div>
                    </button>
                    <button class="scene-btn selected" data-scene="pvp">
                        <div class="icon">⚔️</div>
                        <div class="name">PVP 对枪</div>
                        <div class="desc">真人对抗</div>
                    </button>
                    <button class="scene-btn" data-scene="budget">
                        <div class="icon">💰</div>
                        <div class="name">省钱扫货</div>
                        <div class="desc">练枪/刷任务</div>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="result" id="result">
            <div class="recommendation-card" id="recCard">
                <div class="weapon-name" id="weaponName">-</div>
                <div class="bullet-name" id="bulletName">-</div>
                <div class="bullet-type" id="bulletType">-</div>
                <div class="why" id="whyText">-</div>
                <div class="price-info">
                    <div class="price-item">
                        <div class="label">单价</div>
                        <div class="value" id="pricePerRound">-</div>
                    </div>
                    <div class="price-item">
                        <div class="label">100发价格</div>
                        <div class="value" id="price100">-</div>
                    </div>
                </div>
            </div>
            
            <div class="alternatives">
                <h3>其他选择</h3>
                <div class="alt-grid" id="altGrid"></div>
            </div>
            
            <div class="tips">
                <h3>💡 选弹技巧</h3>
                <ul id="tipsList"></ul>
            </div>
        </div>
    </div>
    
    <script>
        // 武器弹药数据库
        const weaponAmmoDB = {
            // 突击步枪
            'M4A1': { caliber: '5.56×45mm', weapons: ['M4A1', 'K416', 'M16A4', 'AUG', 'CAR-15', 'SG552'] },
            'AKM': { caliber: '7.62×39mm', weapons: ['AKM', 'PTR-32'] },
            'AK-12': { caliber: '5.45×39mm', weapons: ['AK-12', 'AKS-74U'] },
            'QBZ95-1': { caliber: '5.8×42mm', weapons: ['QBZ95-1', 'QJB95-1'] },
            'M7': { caliber: '6.8×51mm', weapons: ['M7', 'M250'] },
            'SCAR-H': { caliber: '7.62×51mm', weapons: ['SCAR-H', 'G3', 'M14', 'SR-25'] },
            // 冲锋枪
            'MP5': { caliber: '9×19mm', weapons: ['MP5', 'UZI', '野牛', '勇士'] },
            'P90': { caliber: '5.7×28mm', weapons: ['P90'] },
            'Vector': { caliber: '.45口径', weapons: ['Vector', 'SMG-45'] },
            'MP7': { caliber: '4.6×30mm', weapons: ['MP7'] },
            // 狙击步枪
            'PKM': { caliber: '7.62×54mmR', weapons: ['PKM', 'SVD', 'SV-98'] },
            'R93': { caliber: '7.62×51mm', weapons: ['R93', 'M700'] },
            'AWM': { caliber: '.338 Lapua', weapons: ['AWM'] },
            'ASVal': { caliber: '9×39mm', weapons: ['AS Val', 'VSS', 'SR-3M'] },
            // 霰弹枪
            'M870': { caliber: '12 Gauge', weapons: ['M870', 'M1014', 'S12K'] },
        };
        
        // 子弹数据
        const bulletDB = {
            '5.56×45mm': [
                { name: 'M995', type: 'ap', price: 4212, desc: '穿甲弹，穿透力极强', reason: 'PVE打AI必选，能穿透高级护甲' },
                { name: 'M855A1', type: 'balanced', price: 1671, desc: '增强型穿甲弹', reason: 'PVP首选，伤害与穿透平衡' },
                { name: 'M855', type: 'fm', price: 391, desc: '标准穿甲弹', reason: '日常使用足够' },
                { name: 'FMJ', type: 'fm', price: 79, desc: '全金属被甲弹', reason: '便宜，近距离够用' },
                { name: 'RRLP', type: 'hp', price: 35, desc: '空尖弹', reason: '最便宜，省钱首选' },
            ],
            '7.62×39mm': [
                { name: 'AP', type: 'ap', price: 4671, desc: '高穿透穿甲弹', reason: 'PVE打重甲AI必选' },
                { name: 'BP', type: 'ap', price: 1156, desc: '穿甲弹', reason: '性价比最高的穿甲弹' },
                { name: 'PS', type: 'fm', price: 446, desc: '标准弹', reason: '日常使用' },
                { name: 'LP', type: 'hp', price: 43, desc: '空尖弹', reason: '最便宜，近距离高伤' },
            ],
            '9×19mm': [
                { name: 'PBP', type: 'ap', price: 1096, desc: '穿甲弹', reason: '9mm穿甲最强' },
                { name: 'AP6.3', type: 'ap', price: 276, desc: '穿甲弹', reason: '穿甲+便宜，PVP首选' },
                { name: 'RIP', type: 'hp', price: 558, desc: '空尖弹', reason: '近距离一枪倒地' },
                { name: 'Pst', type: 'fm', price: 88, desc: '标准弹', reason: '日常使用' },
                { name: 'PSO', type: 'hp', price: 29, desc: '空尖弹', reason: '最便宜，扫货练枪' },
            ],
            '5.45×39mm': [
                { name: 'BS', type: 'ap', price: 4144, desc: '高穿透穿甲弹', reason: '穿透力最强' },
                { name: 'BT', type: 'ap', price: 916, desc: '穿甲弹', reason: '穿甲效果不错' },
                { name: 'PS', type: 'fm', price: 399, desc: '标准弹', reason: '日常使用' },
                { name: 'PRS', type: 'hp', price: 40, desc: '空尖弹', reason: '最便宜' },
            ],
            '7.62×51mm': [
                { name: 'M62', type: 'ap', price: 5567, desc: '穿甲弹', reason: '狙击枪穿甲首选' },
                { name: 'M80', type: 'fm', price: 1378, desc: '全威力弹', reason: '狙击标准弹' },
                { name: 'Ultra Nosler', type: 'hp', price: 119, desc: '空尖弹', reason: '便宜' },
            ],
            '7.62×54mmR': [
                { name: 'BT', type: 'ap', price: 4294, desc: '穿甲弹', reason: 'PKM/SVD穿甲弹' },
                { name: 'LPS', type: 'fm', price: 2010, desc: '标准弹', reason: '狙击标准弹' },
                { name: 'T46M', type: 'hp', price: 522, desc: '空尖弹', reason: '便宜' },
            ],
            '5.7×28mm': [
                { name: 'SS190', type: 'ap', price: 4377, desc: '高穿透穿甲弹', reason: 'P90最强穿甲' },
                { name: 'SS193', type: 'ap', price: 1713, desc: '穿甲弹', reason: '性价比穿甲' },
                { name: 'SS197SR', type: 'fm', price: 97, desc: '标准弹', reason: '便宜日常' },
                { name: 'SS198LF', type: 'hp', price: 38, desc: '空尖弹', reason: '最便宜' },
            ],
            '4.6×30mm': [
                { name: 'AP SX', type: 'ap', price: 3612, desc: '高穿透穿甲弹', reason: 'MP7穿甲弹' },
                { name: 'FMJ SX', type: 'fm', price: 1220, desc: '标准弹', reason: '日常使用' },
                { name: 'Subsonic SX', type: 'hp', price: 387, desc: '亚音速弹', reason: '便宜+消音' },
            ],
            '.45口径': [
                { name: 'AP', type: 'ap', price: 1540, desc: '穿甲弹', reason: '.45最强穿甲' },
                { name: 'RIP', type: 'hp', price: 620, desc: '空尖弹', reason: '高停止力' },
                { name: 'HS', type: 'hp', price: 43, desc: '空尖弹', reason: '最便宜' },
            ],
            '12 Gauge': [
                { name: '龙息弹', type: 'fm', price: 2120, desc: '特殊弹', reason: '近战神器' },
                { name: '独头 AP-20', type: 'ap', price: 591, desc: '穿甲独头弹', reason: '远程穿透' },
                { name: '8.5鹿弹', type: 'fm', price: 383, desc: '标准鹿弹', reason: '日常使用' },
                { name: '7鹿弹', type: 'hp', price: 28, desc: '小号鹿弹', reason: '最便宜' },
            ],
            '9×39mm': [
                { name: 'SP-6', type: 'ap', price: 800, desc: '穿甲弹', reason: 'VSS/AS Val穿甲' },
                { name: 'PAB-9', type: 'hp', price: 200, desc: '空尖弹', reason: '便宜' },
            ],
        };
        
        // 场景推荐
        const sceneRec = {
            pve: { type: 'ap', name: 'AP穿甲弹' },
            pvp: { type: 'balanced', name: '平衡型子弹' },
            budget: { type: 'fm', name: '便宜子弹' },
        };
        
        let selectedWeapon = null;
        let selectedScene = 'pvp';
        
        // 生成武器按钮
        function initWeaponGrid() {
            const grid = document.getElementById('weaponGrid');
            let html = '';
            
            const categories = [
                { name: '突击步枪', weapons: ['M4A1', 'AKM', 'AK-12', 'QBZ95-1', 'M7', 'SCAR-H'] },
                { name: '冲锋枪', weapons: ['MP5', 'P90', 'Vector', 'MP7'] },
                { name: '狙击/机枪', weapons: ['PKM', 'R93', 'AWM', 'ASVal'] },
                { name: '霰弹枪', weapons: ['M870'] },
            ];
            
            categories.forEach(cat => {
                cat.weapons.forEach(w => {
                    const data = weaponAmmoDB[w];
                    if (data) {
                        html += `
                            <button class="weapon-btn" data-weapon="${w}" data-caliber="${data.caliber}">
                                <div class="name">${w}</div>
                                <div class="caliber">${data.caliber}</div>
                            </button>
                        `;
                    }
                });
            });
            
            grid.innerHTML = html;
            
            // 绑定事件
            grid.querySelectorAll('.weapon-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    grid.querySelectorAll('.weapon-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedWeapon = {
                        name: btn.dataset.weapon,
                        caliber: btn.dataset.caliber
                    };
                    updateRecommendation();
                });
            });
        }
        
        // 绑定场景选择
        document.querySelectorAll('.scene-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.scene-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedScene = btn.dataset.scene;
                updateRecommendation();
            });
        });
        
        // 更新推荐
        function updateRecommendation() {
            if (!selectedWeapon) return;
            
            const caliber = selectedWeapon.caliber;
            const bullets = bulletDB[caliber] || [];
            if (bullets.length === 0) return;
            
            // 根据场景选择
            let rec;
            if (selectedScene === 'pve') {
                // PVE: 优先AP穿甲
                rec = bullets.find(b => b.type === 'ap') || bullets[0];
            } else if (selectedScene === 'pvp') {
                // PVP: 优先平衡型，其次AP
                rec = bullets.find(b => b.type === 'balanced') || bullets.find(b => b.type === 'ap') || bullets[0];
            } else {
                // 省钱: 最便宜的
                rec = bullets.reduce((min, b) => b.price < min.price ? b : min, bullets[0]);
            }
            
            // 渲染推荐
            document.getElementById('weaponName').textContent = selectedWeapon.name;
            document.getElementById('bulletName').textContent = rec.name;
            
            const typeEl = document.getElementById('bulletType');
            const typeNames = { ap: '穿甲弹 AP', hp: '空尖弹 HP', fm: '标准弹 FMJ', balanced: '增强型' };
            typeEl.textContent = typeNames[rec.type] || rec.type;
            typeEl.className = 'bullet-type ' + rec.type;
            
            document.getElementById('whyText').textContent = rec.reason;
            document.getElementById('pricePerRound').textContent = rec.price + ' $';
            document.getElementById('price100').textContent = (rec.price * 100).toLocaleString() + ' $';
            
            // 渲染其他选择
            const altGrid = document.getElementById('altGrid');
            const alts = bullets.filter(b => b !== rec).slice(0, 4);
            altGrid.innerHTML = alts.map(b => `
                <div class="alt-item">
                    <span class="name">${b.name}</span>
                    <span class="price">${b.price} $/发</span>
                </div>
            `).join('');
            
            // 生成技巧
            const tips = [
                `${selectedWeapon.name} 使用${caliber}弹药`,
                `${rec.name}适合${selectedScene === 'pve' ? 'PVE打AI' : selectedScene === 'pvp' ? 'PVP对抗' : '省钱扫货'}`,
                `100发${rec.name}需要${(rec.price * 100).toLocaleString()}哈夫币`
            ];
            document.getElementById('tipsList').innerHTML = tips.map(t => `<li>${t}</li>`).join('');
            
            document.getElementById('result').classList.add('show');
        }
        
        // 初始化
        initWeaponGrid();
    </script>
</body>
</html>
