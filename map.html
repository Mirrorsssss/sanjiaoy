<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物资分布图 - 三角眼</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0e1a;
            color: #fff;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, rgba(255, 107, 0, 0.2) 0%, rgba(255, 107, 0, 0.05) 100%);
            border-bottom: 3px solid #ff6b00;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            color: #ff6b00;
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #888;
            font-size: 0.9em;
        }
        
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid #333;
        }
        
        .toolbar-section {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .toolbar-label {
            color: #888;
            font-size: 0.85em;
            margin-right: 5px;
        }
        
        .btn {
            padding: 8px 16px;
            background: rgba(255, 107, 0, 0.2);
            border: 2px solid #ff6b00;
            border-radius: 6px;
            color: #ff6b00;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9em;
        }
        
        .btn:hover, .btn.active {
            background: #ff6b00;
            color: #000;
        }
        
        .btn-small {
            padding: 5px 10px;
            font-size: 0.8em;
        }
        
        .main-container {
            display: flex;
            height: calc(100vh - 140px);
        }
        
        #map {
            flex: 1;
            background: #1a1f3a;
        }
        
        .sidebar {
            width: 320px;
            background: rgba(26, 31, 58, 0.95);
            border-left: 1px solid #333;
            overflow-y: auto;
            padding: 15px;
        }
        
        .sidebar-title {
            color: #ff6b00;
            font-size: 1.1em;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .item-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .item-card:hover {
            border-color: #ff6b00;
            background: rgba(255, 107, 0, 0.1);
        }
        
        .item-card .name {
            color: #fff;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .item-card .info {
            color: #888;
            font-size: 0.85em;
        }
        
        .item-card .floor {
            display: inline-block;
            background: rgba(255, 107, 0, 0.2);
            color: #ff6b00;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            margin-top: 5px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        
        .stat-card .value {
            color: #ff6b00;
            font-size: 1.5em;
            font-weight: bold;
        }
        
        .stat-card .label {
            color: #888;
            font-size: 0.8em;
        }
        
        .leaflet-popup-content {
            background: #1a1f3a;
            color: #fff;
            border: 1px solid #ff6b00;
            border-radius: 8px;
            padding: 15px;
            min-width: 180px;
        }
        
        .leaflet-popup-tip {
            background: #1a1f3a;
        }
        
        .popup-title {
            color: #ff6b00;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 1.1em;
        }
        
        .popup-info {
            color: #ccc;
            font-size: 0.9em;
            line-height: 1.5;
        }
        
        .popup-floor {
            display: inline-block;
            background: rgba(255, 107, 0, 0.2);
            color: #ff6b00;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-top: 5px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                height: auto;
            }
            
            #map {
                height: 50vh;
            }
            
            .sidebar {
                width: 100%;
                height: auto;
                max-height: 50vh;
            }
            
            .toolbar {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📍 物资分布图</h1>
        <p>点击地图上的物资点位查看详情 | 使用滚轮缩放地图</p>
    </div>
    
    <div class="toolbar">
        <div class="toolbar-section">
            <span class="toolbar-label">地图:</span>
            <button class="btn active" data-map="零号大坝">零号大坝</button>
            <button class="btn" data-map="长弓溪谷">长弓溪谷</button>
            <button class="btn" data-map="航天基地">航天基地</button>
            <button class="btn" data-map="巴克什">巴克什</button>
        </div>
        <div class="toolbar-section">
            <span class="toolbar-label">难度:</span>
            <button class="btn btn-small active" data-diff="普通">普通</button>
            <button class="btn btn-small" data-diff="机密">机密</button>
            <button class="btn btn-small" data-diff="绝密">绝密</button>
        </div>
    </div>
    
    <div class="main-container">
        <div id="map"></div>
        <div class="sidebar">
            <div class="sidebar-title">📋 物资列表</div>
            <div class="stats">
                <div class="stat-card">
                    <div class="value" id="totalCount">0</div>
                    <div class="label">物资总数</div>
                </div>
                <div class="stat-card">
                    <div class="value" id="categoryCount">0</div>
                    <div class="label">物资类型</div>
                </div>
            </div>
            <div id="itemList" class="item-list">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="map_data_all.json"></script>
    <script>
        // 数据映射
        const mapKeyMap = {
            '零号大坝': '零号大坝',
            '长弓溪谷': '长弓溪谷',
            '航天基地': '航天基地',
            '巴克什': '巴克什'
        };
        
        // 难度后缀
        const diffSuffix = {
            '普通': '',
            '机密': '2',
            '绝密': '3'
        };
        
        // 当前状态
        let currentMap = '零号大坝';
        let currentDiff = '普通';
        let mapData = null;
        let markers = [];
        let stats = {};
        
        // 初始化地图
        const map = L.map('map', {
            crs: L.CRS.Simple,
            minZoom: -3,
            maxZoom: 2,
            zoomControl: true
        });
        
        // 设置地图边界（无底图，使用半透明背景）
        const bounds = [[-500, -500], [500, 500]];
        L.rectangle(bounds, {
            color: '#ff6b00',
            weight: 2,
            fillColor: '#1a1f3a',
            fillOpacity: 0.3
        }).addTo(map);
        map.fitBounds(bounds);
        map.setMaxBounds([[-600, -600], [600, 600]]);
        
        // 坐标转换函数
        function worldToLatLng(x, y, mapInfo) {
            // 根据地图的实际宽高和中心点进行转换
            const scale = 0.01; // 缩放因子
            const lat = (mapInfo.centerY - y) * scale;
            const lng = (x - mapInfo.centerX) * scale;
            return [lat, lng];
        }
        
        // 分类图标颜色
        const categoryColors = {
            '保险柜': '#FFD700',
            '小保险箱': '#FFA500',
            '武器箱': '#FF4444',
            '医疗箱': '#44FF44',
            '弹药箱': '#44AAFF',
            '装备箱': '#AA44FF',
            '特殊': '#FF44AA',
            '钥匙卡': '#44FFAA',
            'default': '#FF6B00'
        };
        
        // 创建自定义图标
        function createMarkerIcon(color) {
            return L.divIcon({
                className: 'custom-marker',
                html: `<div style="
                    width: 12px;
                    height: 12px;
                    background: ${color};
                    border: 2px solid #fff;
                    border-radius: 50%;
                    box-shadow: 0 0 10px ${color};
                "></div>`,
                iconSize: [12, 12],
                iconAnchor: [6, 6]
            });
        }
        
        // 获取物资图标颜色
        function getCategoryColor(name) {
            for (const [cat, color] of Object.entries(categoryColors)) {
                if (name.includes(cat)) return color;
            }
            return categoryColors.default;
        }
        
        // 加载地图数据
        function loadMapData(mapName) {
            mapData = window.mapDataAll[mapName];
            if (!mapData) {
                console.error('未找到地图数据:', mapName);
                return;
            }
            
            // 更新地图范围
            const mapInfo = mapData.map_info;
            const newBounds = [
                [-mapInfo.height / 2000, -mapInfo.width / 2000],
                [mapInfo.height / 2000, mapInfo.width / 2000]
            ];
            map.fitBounds(newBounds);
            
            // 显示物资点
            displayItems();
        }
        
        // 获取当前难度的物资数据
        function getCurrentItems() {
            if (!mapData) return [];
            
            const suffix = diffSuffix[currentDiff];
            const navKey = 'navList' + suffix;
            const articleKey = 'mapArticle' + suffix;
            
            const navData = mapData[navKey] || [];
            const articleData = mapData[articleKey] || {};
            
            // 收集所有物资点位
            const items = [];
            
            // 遍历导航分类
            navData.forEach(nav => {
                if (!nav.typeList) return;
                
                nav.typeList.forEach(type => {
                    const typeArticles = articleData[type.idType] || [];
                    
                    typeArticles.forEach(article => {
                        // 获取楼层信息
                        let floor = '1F';
                        if (article.floor && mapData.map_info.floor) {
                            const floorInfo = mapData.map_info.floor.find(f => f.floor_f === article.floor);
                            if (floorInfo) {
                                floor = floorInfo.floor_name || article.floor;
                            }
                        }
                        
                        items.push({
                            name: type.name,
                            x: article.x,
                            y: article.y,
                            floor: floor || article.floor || '1F',
                            typeId: type.idType
                        });
                    });
                });
            });
            
            return items;
        }
        
        // 显示物资点
        function displayItems() {
            // 清除旧标记
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            stats = {};
            
            const items = getCurrentItems();
            const mapInfo = mapData.map_info;
            
            items.forEach(item => {
                const color = getCategoryColor(item.name);
                
                // 统计
                if (!stats[item.name]) {
                    stats[item.name] = { count: 0, items: [] };
                }
                stats[item.name].count++;
                stats[item.name].items.push(item);
                
                // 坐标转换
                const scale = 0.002;
                const lat = (mapInfo.centerY - item.y) * scale;
                const lng = (item.x - mapInfo.centerX) * scale;
                
                const marker = L.marker([lat, lng], {
                    icon: createMarkerIcon(color)
                }).addTo(map);
                
                marker.bindPopup(`
                    <div class="popup-title">${item.name}</div>
                    <div class="popup-info">
                        坐标: (${Math.round(item.x)}, ${Math.round(item.y)})
                        <span class="popup-floor">${item.floor}</span>
                    </div>
                `, {
                    closeButton: false
                });
                
                marker.on('mouseover', function() {
                    this.openPopup();
                });
                
                markers.push(marker);
            });
            
            // 更新统计
            updateStats();
            updateItemList();
        }
        
        // 更新统计
        function updateStats() {
            const totalCount = Object.values(stats).reduce((sum, s) => sum + s.count, 0);
            const categoryCount = Object.keys(stats).length;
            
            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('categoryCount').textContent = categoryCount;
        }
        
        // 更新物资列表
        function updateItemList() {
            const itemList = document.getElementById('itemList');
            const sortedStats = Object.entries(stats)
                .sort((a, b) => b[1].count - a[1].count);
            
            if (sortedStats.length === 0) {
                itemList.innerHTML = '<div class="loading">暂无数据</div>';
                return;
            }
            
            itemList.innerHTML = sortedStats.map(([name, data]) => {
                const color = getCategoryColor(name);
                const sample = data.items[0];
                
                return `
                    <div class="item-card" onclick="focusItem('${name}')">
                        <div class="name" style="color: ${color}">
                            <span style="display:inline-block;width:8px;height:8px;background:${color};border-radius:50%;margin-right:6px;"></span>
                            ${name}
                        </div>
                        <div class="info">数量: ${data.count}</div>
                        <div class="floor">${sample.floor}</div>
                    </div>
                `;
            }).join('');
        }
        
        // 定位到物资
        function focusItem(name) {
            const item = stats[name];
            if (!item || !item.items[0]) return;
            
            const mapInfo = mapData.map_info;
            const first = item.items[0];
            const scale = 0.002;
            const lat = (mapInfo.centerY - first.y) * scale;
            const lng = (first.x - mapInfo.centerX) * scale;
            
            map.setView([lat, lng], 1);
        }
        
        // 事件绑定
        document.querySelectorAll('[data-map]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-map]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMap = btn.dataset.map;
                loadMapData(currentMap);
            });
        });
        
        document.querySelectorAll('[data-diff]').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('[data-diff]').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentDiff = btn.dataset.diff;
                displayItems();
            });
        });
        
        // 初始化
        window.addEventListener('load', () => {
            loadMapData(currentMap);
        });
    </script>
</body>
</html>
