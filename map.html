<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地图物资 - 三角眼</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e17; --bg2: #111827; --card: #1a2235; --border: #2a3654;
            --text: #f0f4ff; --muted: #8896b3; --accent: #ff6b35;
            --green: #22c55e; --blue: #3b82f6; --red: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
        a { color: var(--accent); text-decoration: none; }

        header {
            background: var(--bg2); border-bottom: 1px solid var(--border);
            padding: 12px 20px; display: flex; align-items: center; gap: 20px;
            flex-shrink: 0; z-index: 1000;
        }
        header .logo { font-size: 18px; font-weight: 700; color: var(--accent); }
        header .logo span { color: var(--text); }
        header .back { font-size: 13px; color: var(--muted); }
        header .back:hover { color: var(--text); }

        .controls {
            display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-left: auto;
        }
        .ctrl-group { display: flex; gap: 6px; align-items: center; }
        .ctrl-label { font-size: 12px; color: var(--muted); }
        select, button {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 5px 10px; border-radius: 6px; font-family: inherit; font-size: 13px;
            cursor: pointer;
        }
        select:hover, button:hover { border-color: var(--accent); }
        button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        .main { flex: 1; display: flex; overflow: hidden; }

        #map { flex: 1; background: #0d1520; }

        .sidebar {
            width: 280px; background: var(--bg2); border-left: 1px solid var(--border);
            overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column;
        }
        .sidebar-header {
            padding: 12px; border-bottom: 1px solid var(--border); font-size: 13px;
            color: var(--muted); display: flex; justify-content: space-between;
        }
        .legend { padding: 10px 12px; border-bottom: 1px solid var(--border); }
        .legend-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; cursor: pointer; }
        .legend-item input[type=checkbox] { accent-color: var(--accent); }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

        .item-list { flex: 1; overflow-y: auto; padding: 8px; }
        .item-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 8px;
            padding: 10px; margin-bottom: 6px; cursor: pointer; transition: all 0.15s;
        }
        .item-card:hover { border-color: var(--accent); transform: translateX(2px); }
        .item-card .item-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
        .item-card .item-meta { font-size: 11px; color: var(--muted); }
        .item-card .item-area { font-size: 11px; color: var(--accent); margin-top: 2px; }
        .item-card.random { border-color: rgba(245, 158, 11, 0.3); }

        .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); }
        .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .stats { padding: 10px 12px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
        .stats strong { color: var(--accent); }

        .leaflet-popup-content-wrapper { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); }
        .leaflet-popup-tip { background: var(--bg2); }
        .leaflet-popup-content { margin: 10px 12px; font-size: 12px; }
        .popup-name { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
        .popup-meta { color: var(--muted); }
    </style>
</head>
<body>
<header>
    <a href="index.html" class="back">← 回到三角眼</a>
    <div class="logo">🛡 三角眼 <span>· 地图物资</span></div>
    <div class="controls">
        <div class="ctrl-group">
            <span class="ctrl-label">地图</span>
            <select id="map-select">
                <option value="0haoDaba">零号大坝</option>
                <option value="longbow">长弓溪谷</option>
                <option value="hangtian">航天基地</option>
                <option value="bakeshi">巴克什</option>
            </select>
        </div>
        <div class="ctrl-group">
            <span class="ctrl-label">难度</span>
            <select id="diff-select">
                <option value="normal">普通</option>
                <option value="classified">机密</option>
                <option value="top_secret">绝密</option>
                <option value="unknown">机密+</option>
            </select>
        </div>
        <button id="toggle-sidebar">📋 侧边栏</button>
    </div>
</header>

<div class="main">
    <div id="map"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>物资列表</span>
            <span id="item-count">--</span>
        </div>
        <div class="legend" id="legend"></div>
        <div class="item-list" id="item-list">
            <div class="loading"><div class="spinner"></div></div>
        </div>
        <div class="stats" id="stats"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const MAP_FILES = {
    '0haoDaba':  'map_零hao大坝.json',
    'longbow':   'map_长gongxigu.json',
    'hangtian':  'map_hang天jidi.json',
    'bakeshi':   'map_bakeshi.json',
};

const CATEGORY_COLORS = {
    '保险柜':   '#f59e0b',
    '小保险箱': '#f97316',
    '服务器':   '#3b82f6',
    '电脑':     '#22c55e',
    '电脑机箱': '#16a34a',
    '武器箱':   '#ef4444',
    '大武器箱': '#dc2626',
    '弹药箱':   '#f59e0b',
    '工具柜':   '#6b7280',
    '大工具盒': '#4b5563',
    '实验服':   '#a78bfa',
    '衣服':     '#c084fc',
    '医疗包':   '#22c55e',
    '医疗物资堆':'#16a34a',
    '旅行袋':   '#0ea5e9',
    '手提箱':   '#06b6d4',
    '储物柜':   '#64748b',
    '高级储物箱':'#8b5cf6',
    '抽屉柜':   '#6366f1',
    '登山包':   '#14b8a6',
    '快递箱':   '#84cc16',
    '航空储物箱':'#a3e635',
    '垃圾箱':   '#78716c',
    '水泥车':   '#57534e',
    '野外物资箱':'#eab308',
    '鸟窝':     '#92400e',
    '藏匿物':   '#fbbf24',
    '高级旅行箱':'#f59e0b',
    '撤离点':   '#ff6b35',
    '首领':     '#dc2626',
    '出生点':   '#3b82f6',
    '其他':     '#6b7280',
};

const CATEGORY_ICONS = {
    '撤离点': '🚪',
    '首领': '⚠️',
    '出生点': '🏠',
    '保险柜': '🔐',
    '小保险箱': '🗄️',
    '服务器': '🖥️',
    '电脑': '💻',
    '电脑机箱': '🖥️',
    '武器箱': '📦',
    '大武器箱': '📦',
    '弹药箱': '💣',
    '医疗包': '🏥',
    '医疗物资堆': '🏥',
    '工具柜': '🧰',
    '大工具盒': '🧰',
    '衣服': '👕',
    '实验服': '🥼',
    '旅行袋': '🎒',
    '手提箱': '🧳',
    '储物柜': '🗃️',
    '高级储物箱': '🗃️',
    '抽屉柜': '🗄️',
    '登山包': '🎒',
    '快递箱': '📮',
    '航空储物箱': '✈️',
    '垃圾箱': '🗑️',
    '水泥车': '🚛',
    '野外物资箱': '📦',
    '鸟窝': '🪹',
    '藏匿物': '💰',
    '高级旅行箱': '🧳',
    '其他': '📍',
};

let map, markers = [];
let currentData = null;
let activeCategories = new Set(Object.keys(CATEGORY_COLORS));

function init() {
    map = L.map('map', { crs: L.CRS.Simple, minZoom: -2, maxZoom: 5 });
    loadMap();
}

async function loadMap() {
    const mapKey = document.getElementById('map-select').value;
    const diffKey = document.getElementById('diff-select').value;
    const file = MAP_FILES[mapKey];
    const loading = document.querySelector('.loading') || document.getElementById('item-list').querySelector('.loading');

    document.getElementById('item-list').innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    try {
        const res = await fetch(file);
        const mapData = await res.json();

        // Find the matching difficulty
        const diff = mapData.difficulties[diffKey] || mapData.difficulties.normal;
        if (!diff) {
            document.getElementById('item-list').innerHTML = '<div style="padding:20px;color:var(--muted)">该难度暂无数据</div>';
            return;
        }

        currentData = { map: mapData, diff: diff };

        // 计算边界：用数据里所有点位的 x/y 极值
        const items = diff.items || [];
        let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
        for (const it of items) {
            const x = parseFloat(it.x) || 0, y = parseFloat(it.y) || 0;
            if (x < minX) minX = x; if (x > maxX) maxX = x;
            if (y < minY) minY = y; if (y > maxY) maxY = y;
        }
        // 若没有数据则用 map_info 里的宽高
        const w = mapData.width / 128, h = mapData.height / 128;
        if (!isFinite(minX)) { minX = 0; minY = -h; maxX = w; maxY = 0; }
        const padX = (maxX - minX) * 0.05 || 1;
        const padY = (maxY - minY) * 0.05 || 1;
        const bounds = [[minY - padY, minX - padX], [maxY + padY, maxX + padX]];

        // 移除旧图层
        if (map._layers) {
            Object.values(map._layers).forEach(l => map.removeLayer(l));
        }

        // 无底图：用半透明矩形表示地图区域 + 坐标网格
        L.rectangle(bounds, {
            color: '#475569', fillColor: '#1e293b', fillOpacity: 0.4,
            weight: 1, dashArray: '6 4'
        }).addTo(map);

        // 画坐标网格（每 100 单位一格）
        const gridStep = 100;
        for (let gx = Math.floor(minX / gridStep) * gridStep; gx <= maxX; gx += gridStep) {
            L.polyline([[minY, gx], [maxY, gx]], { color: '#334155', weight: 0.5, opacity: 0.4 }).addTo(map);
        }
        for (let gy = Math.floor(minY / gridStep) * gridStep; gy <= maxY; gy += gridStep) {
            L.polyline([[gy, minX], [gy, maxX]], { color: '#334155', weight: 0.5, opacity: 0.4 }).addTo(map);
        }

        map.fitBounds(bounds);

        renderMarkers(diff.items);
        renderSidebar(mapData, diff);

    } catch(e) {
        console.error('Load error:', e);
        document.getElementById('item-list').innerHTML = '<div style="padding:20px;color:var(--red)">加载失败: ' + e.message + '</div>';
    }
}

function renderMarkers(items) {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    const filtered = items.filter(i => activeCategories.has(i.c));

    for (const item of filtered) {
        const color = CATEGORY_COLORS[i.c] || '#6b7280';
        const icon = L.divIcon({
            html: `<div style="width:12px;height:12px;border-radius:50%;background:${color};border:2px solid rgba(255,255,255,0.5);box-shadow:0 0 6px ${color}"></div>`,
            className: '', iconSize: [12, 12], iconAnchor: [6, 6]
        });

        const m = L.marker([item.y, item.x], { icon }).addTo(map);
        const catIcon = CATEGORY_ICONS[i.c] || '📍';
        m.bindPopup(`
            <div class="popup-name">${catIcon} ${item.n}</div>
            <div class="popup-meta">
                <div>分类: ${i.c}</div>
                <div>区域: ${item.area}</div>
                <div>刷新: ${i.sc || '固定'}</div>
                ${i.isR ? '<div style="color:#f59e0b">⚡ 随机位置</div>' : ''}
            </div>
        `);

        // Click marker → scroll to item in sidebar
        m.on('click', () => {
            const el = document.querySelector(`[data-item-name="${item.n}_${item.area}"]`);
            if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.style.borderColor = 'var(--accent)'; setTimeout(() => el.style.borderColor = '', 1500); }
        });

        markers.push(m);
    }

    document.getElementById('item-count').textContent = `${filtered.length} / ${items.length} 点位`;
    document.getElementById('stats').innerHTML = `显示 <strong>${filtered.length}</strong> / ${items.length} 点位`;
}

function renderSidebar(mapData, diff) {
    // Legend
    const cats = [...new Set(diff.items.map(i => i.c))].sort();
    document.getElementById('legend').innerHTML = cats.map(c => `
        <label class="legend-item">
            <input type="checkbox" checked onchange="toggleCategory('${c}', this.checked)">
            <span class="legend-dot" style="background:${CATEGORY_COLORS[c]||'#6b7280'}"></span>
            ${CATEGORY_ICONS[c]||''} ${c}
        </label>
    `).join('');

    // Item list
    document.getElementById('item-list').innerHTML = diff.items.map(item => {
        const color = CATEGORY_COLORS[item.c] || '#6b7280';
        const isR = item.isR;
        return `
            <div class="item-card ${isR ? 'random' : ''}"
                 data-item-name="${item.n}_${item.area}"
                 onclick="panTo(${item.y}, ${item.x})"
                 style="border-left: 3px solid ${color}">
                <div class="item-name">${CATEGORY_ICONS[item.c]||'📍'} ${item.n}</div>
                <div class="item-meta">${item.c} ${isR ? '⚡' : ''}</div>
                <div class="item-area">${item.area}</div>
            </div>
        `;
    }).join('');
}

function panTo(y, x) {
    map.flyTo([y, x], Math.max(map.getZoom(), 2), { duration: 0.5 });
}

function toggleCategory(cat, checked) {
    if (checked) activeCategories.add(cat);
    else activeCategories.delete(cat);
    if (currentData) renderMarkers(currentData.diff.items);
}

// Event listeners
document.getElementById('map-select').addEventListener('change', loadMap);
document.getElementById('diff-select').addEventListener('change', loadMap);
document.getElementById('toggle-sidebar').addEventListener('click', () => {
    document.getElementById('sidebar').style.display =
        document.getElementById('sidebar').style.display === 'none' ? 'flex' : 'none';
});

init();
</script>
</body>
</html>
